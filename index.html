<script>
window.sw = function (tela, botao) {
  console.log("trocando para:", tela);

  // remove ativo dos botões
  document.querySelectorAll('.sbi').forEach(b => b.classList.remove('on'));
  if (botao) botao.classList.add('on');

  // esconde todas as views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));

  // mostra a view correta
  const view = document.getElementById('view-' + tela);
  if (view) {
    view.classList.add('on');
  } else {
    console.log("view não encontrada:", tela);
  }

  // atualiza título
  const titulo = {
    dash: "Dashboard",
    agenda: "Agenda",
    tarefas: "Tarefas",
    fin: "Financeiro"
  };

  const top = document.getElementById("topbar-t");
  if (top && titulo[tela]) {
    top.innerText = titulo[tela];
  }
};
</script>
