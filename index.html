<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f6f4;--bg1:#fff;--bg2:#f1f1ef;--bg3:#e6e6e2;--bg4:#ccccc6;
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.14);--b3:rgba(0,0,0,0.24);
  --t1:#111;--t2:#5a5a5a;--t3:#aaa;
  --gr:#1a9e62;--gbg:#e6f7ef;--gbdr:rgba(26,158,98,.25);
  --re:#d03030;--rbg:#fdeaea;--rbdr:rgba(208,48,48,.25);
  --bl:#2563eb;--bbg:#eff4ff;--bbdr:rgba(37,99,235,.25);
  --am:#b87300;--abg:#fff3d0;--abdr:rgba(184,115,0,.25);
  --pu:#6d4fc2;--pubg:#f0ebff;--pubdr:rgba(109,79,194,.25);
  --or:#d4580a;--orbg:#fff0e6;
  --sb:224px;--r:8px;--rl:12px;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --slot:38px;
}
body.theme-dark{
  --bg:#0d0d0f;--bg1:#141417;--bg2:#1b1b20;--bg3:#24242b;--bg4:#34343d;
  --b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.16);--b3:rgba(255,255,255,0.24);
  --t1:#f3f3f5;--t2:#b5b5be;--t3:#7a7a84;
  --gbg:rgba(26,158,98,.14);--rbg:rgba(208,48,48,.16);--bbg:rgba(37,99,235,.16);--abg:rgba(184,115,0,.16);--pubg:rgba(109,79,194,.16);--orbg:rgba(212,88,10,.16);
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.sb{width:var(--sb);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh;transition:width .2s;overflow:hidden}
.sb.col{width:52px}
.sb-top{padding:14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);flex-shrink:0;min-height:52px}
.sb-brand{font-family:var(--mono);font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;transition:opacity .15s}
.sb.col .sb-brand{opacity:0;width:0}
.sb-tog{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--b1);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);font-size:16px}
.sb-tog:hover{background:var(--bg2)}
.sb-nav{padding:8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;white-space:nowrap;border:none;background:transparent;width:100%;text-align:left;font-family:var(--sans);font-size:13px;color:var(--t2);transition:all .15s}
.sbi:hover{background:var(--bg2);color:var(--t1)}.sbi.on{background:var(--bg2);color:var(--t1);font-weight:500}
.sbi-ic{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.sbi-lb{overflow:hidden;white-space:nowrap;transition:opacity .15s}
.sb.col .sbi-lb{opacity:0;width:0}
.sb-foot{padding:8px;border-top:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--bg1)}
.topbar-t{font-size:14px;font-weight:500;flex:1}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0;transition:background .3s}
.sync-dot.syncing{background:var(--am)}
.sync-dot.error{background:var(--re)}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}.view.on{display:flex}
.btn{padding:5px 12px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.btn:hover{background:var(--bg2);color:var(--t1)}.btnp{background:var(--t1);color:#fff;border-color:var(--t1)}.btnp:hover{opacity:.85}
.btnd{color:var(--re)}.btnd:hover{background:var(--rbg);border-color:var(--rbdr)}
.sh{padding:9px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg1)}
.st{font-size:10px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer}
.p-pago{background:var(--gbg);color:var(--gr)}.p-pendente{background:var(--abg);color:var(--am)}.p-vencido{background:var(--rbg);color:var(--re)}
.empty{padding:20px;font-size:12px;color:var(--t3);text-align:center}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.tag-trab{background:#e0f0ff;color:#1a5fb5}.tag-casa{background:#e8f5e8;color:#2e7d32}
.tag-pess{background:var(--pubg);color:var(--pu)}.tag-facu{background:var(--abg);color:var(--am)}
.tag-outro{background:var(--bg3);color:var(--t2)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:300;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mbox{background:var(--bg1);border-radius:var(--rl) var(--rl) 0 0;padding:20px;width:100%;max-width:520px;border:1px solid var(--b1);border-bottom:none;max-height:88vh;overflow-y:auto;box-shadow:0 -6px 30px rgba(0,0,0,.1)}
.mbox h3{font-size:13px;font-weight:500;margin-bottom:14px}
.fl{margin-bottom:10px}.fl label{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:8px 10px;border:1px solid var(--b2);border-radius:var(--r);background:var(--bg);color:var(--t1);font-size:13px;font-family:var(--sans);outline:none;transition:border .15s}
.fi:focus{border-color:var(--bl)}.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.dash{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dcard{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.dnav{display:flex;align-items:center;gap:10px}
.dlbl{font-size:15px;font-weight:500;min-width:150px}
.mcards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.mc{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px 14px}
.mc-lbl{font-size:10px;color:var(--t2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.mc-val{font-family:var(--mono);font-size:18px;font-weight:400}
.mc-val.g{color:var(--gr)}.mc-val.r{color:var(--re)}.mc-val.b{color:var(--bl)}.mc-val.a{color:var(--am)}.mc-val.p{color:var(--pu)}
.mc-sub{font-size:10px;color:var(--t3);margin-top:3px}
.ag-hoje-item{padding:9px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;font-size:13px}
.ag-hoje-item:last-child{border-bottom:none}
.ag-hoje-item.missed{background:var(--rbg)}
.ag-hoje-time{font-family:var(--mono);font-size:11px;width:44px;flex-shrink:0;color:var(--t2)}
.ag-hoje-title{flex:1;font-weight:500}
.ag-hoje-dur{font-size:10px;color:var(--t3)}
.ag-hoje-conf{padding:3px 8px;border-radius:20px;border:1px solid var(--b1);background:transparent;font-size:10px;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.ag-hoje-conf:hover{background:var(--gbg);color:var(--gr)}
.ag-hoje-conf.done{background:var(--gbg);color:var(--gr);border-color:transparent}
.missed-dot{width:8px;height:8px;border-radius:50%;background:var(--re);flex-shrink:0}
.ok-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0}
.future-dot{width:8px;height:8px;border-radius:50%;background:var(--bl);flex-shrink:0}
.prog-card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px 16px}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-title{font-size:10px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.07em}
.prog-pct{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--gr)}
.prog-bg{height:7px;background:var(--bg3);border-radius:20px;overflow:hidden;margin-bottom:12px}
.prog-bar{height:100%;border-radius:20px;background:var(--gr);transition:width .5s}
.prog-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pc{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;text-align:center}
.pc-n{font-family:var(--mono);font-size:17px;font-weight:400;margin-bottom:2px}
.pc-l{font-size:10px;color:var(--t3)}
.streak-card{background:var(--t1);color:#fff;border-radius:var(--rl);padding:14px 16px;display:flex;align-items:center;gap:14px}
.streak-num{font-family:var(--mono);font-size:32px;font-weight:300;line-height:1}
.streak-lbl{font-size:12px;opacity:.7;margin-top:3px}
.fw{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.fr2{display:flex;align-items:center;gap:10px}
.flbl2{font-size:11px;color:var(--t2);width:88px;flex-shrink:0;font-weight:500}
.fbg{flex:1;height:6px;background:var(--bg3);border-radius:20px;overflow:hidden}
.fbar{height:100%;border-radius:20px}
.fv{font-size:11px;font-family:var(--mono);min-width:86px;text-align:right}
.alert-item{padding:9px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:9px;font-size:12px}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-chart{padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.cat-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.cat-bar-lbl{width:80px;flex-shrink:0;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:20px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:20px}
.cat-bar-val{font-family:var(--mono);font-size:10px;min-width:60px;text-align:right;color:var(--t2)}
.tk-prox-item{padding:8px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;font-size:12px}
.tk-prox-item:last-child{border-bottom:none}
.tk-prox-title{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk-prox-date{font-size:10px;color:var(--t2);font-family:var(--mono)}
.agh{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg1)}
.agnav{display:flex;gap:4px}
.agnav button{padding:4px 10px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;font-family:var(--sans);transition:all .15s}
.agnav button:hover{background:var(--bg2);color:var(--t1)}
.aglbl{font-size:13px;font-weight:500;flex:1}
.vtog{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:3px}
.vt{padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.vt.on{background:var(--bg1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ag-week{display:flex;flex:1;overflow:hidden}
.ag-tc{width:46px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--b1)}
.ag-tc::-webkit-scrollbar{display:none}
.ag-days{display:flex;flex:1;overflow:hidden}
.agcol{flex:1;overflow-y:auto;border-right:1px solid var(--b1);min-width:0;position:relative}
.agcol:last-child{border-right:none}
.agcol::-webkit-scrollbar{display:none}
.agch{position:sticky;top:0;background:var(--bg1);padding:9px 4px;border-bottom:1px solid var(--b1);font-size:11px;font-weight:500;z-index:10;text-align:center}
.agch small{display:block;font-size:10px;font-weight:400;color:var(--t2);margin-top:2px}
.agch.td{color:var(--bl)}
.agcb{position:relative}
.tslot{height:var(--slot);border-bottom:1px solid var(--b1)}
.tslot.half{border-bottom:1px dashed rgba(0,0,0,.04)}
.ag-tc .tslot{display:flex;align-items:flex-start;padding:2px 6px 0;justify-content:flex-end}
.tlbl{font-size:9px;color:var(--t3);font-family:var(--mono);line-height:1}
.tslot.half .tlbl{opacity:0}
.sarea{position:absolute;left:0;right:0;cursor:pointer}
.sarea:hover{background:rgba(37,99,235,.04)}
.sev{position:absolute;left:3px;right:3px;border-left-width:3px;border-left-style:solid;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:500;overflow:hidden;cursor:pointer;z-index:5}
.sev.missed-ev{border-left-color:var(--re)!important;background:var(--rbg)!important;color:var(--re)!important}
.sev.confirmed-ev{opacity:.7}
.sev .dx{position:absolute;top:4px;right:5px;opacity:0;cursor:pointer;font-size:11px;background:rgba(255,255,255,.9);border-radius:3px;padding:0 3px;line-height:1.5;color:var(--re)}
.sev:hover .dx{opacity:1}
.sev-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px;margin-bottom:1px}
.sev-s{font-size:9px;opacity:.65;font-family:var(--mono)}
.ag-month{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mgh-r{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--b1);flex-shrink:0}
.mgh{padding:7px 4px;font-size:10px;color:var(--t2);text-align:center;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.mgrid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto;align-content:start}
.mday{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);min-height:72px;padding:6px;cursor:pointer;overflow:hidden;transition:background .1s}
.mday:nth-child(7n){border-right:none}.mday:hover{background:var(--bg2)}
.mday.om .dnum{color:var(--t3)}
.dnum{font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:500}
.dnum.today{background:var(--bl);color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.mev{font-size:9px;border-radius:4px;padding:2px 5px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tk-header{padding:8px 14px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg1);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tk-filter-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--b1);background:var(--bg);color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.tk-filter-btn:hover{border-color:var(--b2);color:var(--t1)}
.tk-filter-btn.on{background:var(--t1);color:#fff;border-color:var(--t1)}
.tklayout{display:flex;flex:1;overflow:hidden}
.tkcol{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--b1);overflow:hidden;min-width:140px}
.tkcol:last-child{border-right:none}
.tkch{padding:9px 12px 8px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg1)}
.tkct{font-size:11px;font-weight:500}
.tkcn{font-size:10px;background:var(--bg2);border-radius:20px;padding:1px 8px;color:var(--t2)}
.tklist{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
.tkcard{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;cursor:grab;user-select:none;transition:all .15s}
.tkcard:hover{border-color:var(--b2);box-shadow:0 2px 8px rgba(0,0,0,.06)}.tkcard.dr{opacity:.3;cursor:grabbing}
.tkcard.repeat-card{border-left:3px solid var(--bl)}
.tktitle{font-size:12px;font-weight:500;margin-bottom:5px;line-height:1.4}
.tkmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tktag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.ta{background:var(--rbg);color:var(--re)}.tm{background:var(--abg);color:var(--am)}.tb{background:var(--gbg);color:var(--gr)}
.tk-dlg{background:var(--pubg);color:var(--pu);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.tk-date{font-size:10px;color:var(--t2);background:var(--bg2);padding:2px 7px;border-radius:20px}
.tk-rep{font-size:10px;color:var(--bl);background:var(--bbg);padding:2px 7px;border-radius:20px}
.tkact{display:flex;gap:4px;flex-wrap:wrap}
.tkbtn{padding:3px 9px;border-radius:20px;border:1px solid var(--b1);background:var(--bg);color:var(--t2);cursor:pointer;font-size:10px;font-family:var(--sans);transition:all .1s}
.tkbtn:hover{color:var(--t1);border-color:var(--b2)}
.tkbtn.del{color:var(--re)}.tkbtn.del:hover{background:var(--rbg);border-color:transparent}
.tkbtn.dlg{color:var(--pu)}.tkbtn.dlg:hover{background:var(--pubg);border-color:transparent}
.dzone{min-height:32px;border-radius:var(--r);border:2px dashed transparent;transition:all .15s}
.dzone.over{border-color:var(--bl);background:var(--bbg)}
.addtk{display:flex;align-items:center;gap:6px;padding:7px 12px;margin:4px 8px 8px;border-radius:var(--r);border:1px dashed var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.addtk:hover{border-color:var(--bl);color:var(--bl)}
.tk-panel{display:none;position:fixed;top:52px;right:0;bottom:0;width:270px;background:var(--bg1);border-left:1px solid var(--b1);padding:16px;z-index:50;overflow-y:auto;box-shadow:-4px 0 16px rgba(0,0,0,.07)}
.tk-panel.on{display:block}
.tp-lbl{font-size:10px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;margin-top:12px}
.tp-val{font-size:13px;line-height:1.5}
.finwrap{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.finnav{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.finlbl{font-size:15px;font-weight:500;min-width:140px}
.finnav button{padding:4px 10px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;font-family:var(--sans);transition:all .15s}
.finnav button:hover{background:var(--bg2);color:var(--t1)}
.fin-tabs{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:3px;align-self:flex-start}
.fin-tab{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.fin-tab.on{background:var(--bg1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fin-cards-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.finsec{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.ftable{width:100%;border-collapse:collapse}
.ftable th{font-size:10px;font-weight:500;color:var(--t2);text-align:left;padding:8px 14px;border-bottom:1px solid var(--b1);background:var(--bg);text-transform:uppercase;letter-spacing:.05em}
.ftable td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--b1)}

<script>
// ── GLOBALS (acessíveis por onclick= inline) ──
var db = null, REF = null;
var tasks=[], events=[], pags=[], recs=[], vendas=[];
var hideSaldo=false, themeMode='light';
var streakData={days:[],last:""};
var tkDayFilter='', tkCatFilter='', tkFilterRepeat=false;
var vendaEmpresaFilter='', vendaLojaFilter='';
var finTab='pagar', editFinId=null, finTipo='pag';
var eTkId=null, dragId=null;
var editEvId=null;
var editVendaId=null;
var dM=new Date().getMonth(), dY=new Date().getFullYear();
var fM=new Date().getMonth(), fY=new Date().getFullYear();
var vM=new Date().getMonth(), vY=new Date().getFullYear();
var agV='s', agMon=new Date();
var agS=new Date();
agS.setDate(agS.getDate()-((agS.getDay()+6)%7));
var saveTimer=null;

function setSyncStatus(s){
  var dot=document.getElementById('sync-dot');
  var txt=document.getElementById('sync-txt');
  if(!dot)return;
  dot.className='sync-dot'+(s==='syncing'?' syncing':s==='error'?' error':'');
  txt.textContent=s==='syncing'?'salvando':s==='error'?'erro':'ok';
}

// ── LOAD ──
function loadFromLocalStorage(){
  tasks=JSON.parse(localStorage.getItem('lo5_tasks')||'[]');
  events=JSON.parse(localStorage.getItem('lo5_events')||'[]');
  pags=JSON.parse(localStorage.getItem('lo5_pag')||'[]');
  recs=JSON.parse(localStorage.getItem('lo5_rec')||'[]');
  vendas=JSON.parse(localStorage.getItem('lo5_vendas')||'[]');
  streakData=JSON.parse(localStorage.getItem('lo5_streak')||'{"days":[],"last":""}');
  hideSaldo=localStorage.getItem('lo5_hs')==='1';
  themeMode=localStorage.getItem('lo5_theme')||'light';
}
function applyLoadedData(){
  applyTheme();
  if(hideSaldo){document.getElementById('saldo-lb').textContent='Mostrar saldo';document.getElementById('saldo-ic').textContent='🙈';}
  refreshFinCategoryOptions();
  renderDash();
}

function loadFromFirestore(){
  window._appBooted = true;
  if(!window._fsReady || !window._fsGet){
    setSyncStatus('error');
    loadFromLocalStorage();
    applyLoadedData();
    return;
  }
  setSyncStatus('syncing');
  window._fsGet().then(function(snap){
    if(snap.exists()){
      var d=snap.data();
      tasks=d.tasks||[];
      events=d.events||[];
      pags=d.pags||[];
      recs=d.recs||[];
      vendas=d.vendas||[];
      streakData=d.streakData||{days:[],last:""};
      hideSaldo=d.hideSaldo||false;
      themeMode=d.themeMode||'light';
    } else {
      loadFromLocalStorage();
      saveNow();
    }
    setSyncStatus('ok');
    applyLoadedData();
  }).catch(function(e){
    console.warn('Firestore erro:',e);
    setSyncStatus('error');
    loadFromLocalStorage();
    applyLoadedData();
  });
}

function saveNow(){
  localStorage.setItem('lo5_tasks',JSON.stringify(tasks));
  localStorage.setItem('lo5_events',JSON.stringify(events));
  localStorage.setItem('lo5_pag',JSON.stringify(pags));
  localStorage.setItem('lo5_rec',JSON.stringify(recs));
  localStorage.setItem('lo5_vendas',JSON.stringify(vendas));
  localStorage.setItem('lo5_streak',JSON.stringify(streakData));
  localStorage.setItem('lo5_hs',hideSaldo?'1':'0');
  localStorage.setItem('lo5_theme',themeMode);
  if(!window._fsReady || !window._fsSet){ setSyncStatus('error'); return; }
  setSyncStatus('syncing');
  window._fsSet({
    tasks:tasks,
    events:events,
    pags:pags,
    recs:recs,
    vendas:vendas,
    streakData:streakData,
    hideSaldo:hideSaldo,
    themeMode:themeMode,
    updatedAt:new Date().toISOString()
  }).then(function(){
    setSyncStatus('ok');
  }).catch(function(e){
    console.warn('Erro save:',e);
    setSyncStatus('error');
  });
}

function save(){
  localStorage.setItem('lo5_tasks',JSON.stringify(tasks));
  localStorage.setItem('lo5_events',JSON.stringify(events));
  localStorage.setItem('lo5_pag',JSON.stringify(pags));
  localStorage.setItem('lo5_rec',JSON.stringify(recs));
  localStorage.setItem('lo5_vendas',JSON.stringify(vendas));
  if(saveTimer)clearTimeout(saveTimer);
  setSyncStatus('syncing');
  saveTimer=setTimeout(function(){saveNow();},800);
}

// ── BACKUP JSON ──
function exportJSON(){
  var data={tasks:tasks,events:events,pags:pags,recs:recs,vendas:vendas,streakData:streakData,exportedAt:new Date().toISOString()};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='lucas-os-backup-'+nowDS()+'.json';
  a.click();
}
function importJSON(e){
  var file=e.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result);
      if(confirm('Importar backup? Dados atuais serão substituídos.')){
        tasks=d.tasks||[];events=d.events||[];pags=d.pags||[];recs=d.recs||[];vendas=d.vendas||[];
        streakData=d.streakData||{days:[],last:""};
        saveNow();
        renderDash();
        alert('Backup importado com sucesso!');
      }
    }catch(err){alert('Arquivo inválido.');}
  };
  reader.readAsText(file);
  e.target.value='';
}

// ── CONSTANTS ──
var MF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
var MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
var DP=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
var SLOT_H=38;
var TITLES={dash:'Dashboard',agenda:'Agenda',tarefas:'Tarefas',fin:'Financeiro',vendas:'Vendas'};
var COR={bl:{bg:'rgba(37,99,235,.1)',bd:'#2563eb',tx:'#1d4ed8'},gr:{bg:'rgba(26,158,98,.1)',bd:'#1a9e62',tx:'#15794b'},am:{bg:'rgba(184,115,0,.1)',bd:'#b87300',tx:'#9a6100'},re:{bg:'rgba(208,48,48,.1)',bd:'#d03030',tx:'#b52828'},pu:{bg:'rgba(109,79,194,.1)',bd:'#6d4fc2',tx:'#5a3ea8'}};
var CAT_COLORS={fornecedor:'var(--gr)',marketplace:'var(--pu)',importacao:'var(--or)',pessoal:'var(--bl)',escritorio:'var(--am)',faculdade:'var(--re)',outro:'var(--t2)'};
var CAT_BG={fornecedor:'var(--gbg)',marketplace:'var(--pubg)',importacao:'var(--orbg)',pessoal:'var(--bbg)',escritorio:'var(--abg)',faculdade:'var(--rbg)',outro:'var(--bg3)'};
var TK_CAT_CLASS={trabalho:'tag-trab',casa:'tag-casa',pessoal:'tag-pess',faculdade:'tag-facu',outro:'tag-outro'};

// ── HORAS DA AGENDA — CORRIGIDO ──
// Antes havia "..." literal no código, o que quebrava todo o JS
var HOURS = [];
for(var _h = 7; _h <= 22; _h++){
  HOURS.push({lb: String(_h).padStart(2,'0')+':00', t: String(_h).padStart(2,'0')+':00', half: false});
  if(_h < 22){
    HOURS.push({lb: '', t: String(_h).padStart(2,'0')+':30', half: true});
  }
}
var TS = HOURS.length;

function refreshFinCategoryOptions(){
  var dl=document.getElementById('fin-cat-list');if(!dl)return;
  var base=['fornecedor','marketplace','importacao','pessoal','escritorio','faculdade','outro'];
  var extra=[];
  pags.concat(recs).forEach(function(e){if(e.cat&&base.indexOf(e.cat)<0&&extra.indexOf(e.cat)<0)extra.push(e.cat);});
  dl.innerHTML=base.concat(extra).map(function(c){return'<option value="'+c+'">';}).join('');
}

// ── HELPERS ──
function R(v){if(hideSaldo)return'R$ ••••';return'R$\u00a0'+(Number(v)||0).toFixed(2).replace('.',',');}
function Rraw(v){return'R$\u00a0'+(Number(v)||0).toFixed(2).replace('.',',');}
function fd(d){if(!d)return'—';var p=d.split('-');return p[2]+'/'+p[1];}
function toDS(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function nowDS(){return toDS(new Date());}
function nowHM(){var n=new Date();return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');}
function addDaysDS(ds,n){var d=new Date(ds+'T00:00:00');d.setDate(d.getDate()+n);return toDS(d);}
function nextRepeatDate(ds,rep){return addDaysDS(ds,rep==='semanal'?7:1);}
function cmo(id){document.getElementById(id).classList.remove('on');}
function omo(id){document.getElementById(id).classList.add('on');}
function sw(v,btn){
  document.querySelectorAll('.view').forEach(function(e){e.classList.remove('on');});
  document.querySelectorAll('.sbi').forEach(function(e){e.classList.remove('on');});
  document.getElementById('view-'+v).classList.add('on');
  if(btn)btn.classList.add('on');
  else{var b=document.querySelector('.sbi[onclick*="\''+v+'\'"]');if(b)b.classList.add('on');}
  document.getElementById('topbar-t').textContent=TITLES[v];
  if(v==='agenda')renderAg();
  if(v==='fin')renderFin();
  if(v==='tarefas')renderTasks();
  if(v==='dash')renderDash();
  if(v==='vendas')renderVendas();
}

function updateTopbarDate(){
  var d=new Date();
  document.getElementById('topbar-date').textContent=DP[d.getDay()]+', '+d.getDate()+' '+MS[d.getMonth()]+' '+d.getFullYear();
}
updateTopbarDate();

var sbOpen=true;
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('col',!sbOpen);}

function toggleSaldo(){
  hideSaldo=!hideSaldo;
  document.getElementById('saldo-lb').textContent=hideSaldo?'Mostrar saldo':'Ocultar saldo';
  document.getElementById('saldo-ic').textContent=hideSaldo?'🙈':'👁';
  save();
  var av=document.querySelector('.view.on');if(!av)return;
  var v=av.id.replace('view-','');
  if(v==='dash')renderDash();if(v==='fin')renderFin();
}

function applyTheme(){
  document.body.classList.toggle('theme-dark',themeMode==='dark');
  var ic=document.getElementById('theme-ic'),lb=document.getElementById('theme-lb');
  if(ic)ic.textContent=themeMode==='dark'?'☀️':'🌙';
  if(lb)lb.textContent=themeMode==='dark'?'Tema claro':'Tema preto';
}
function toggleTheme(){
  themeMode=themeMode==='dark'?'light':'dark';
  applyTheme();save();
}

// ── STREAK ──
function updateStreak(){
  var tod=nowDS();
  if(streakData.last===tod)return;
  var done=tasks.filter(function(t){return t.status==='concluido'&&t.completedAt===tod;}).length;
  if(done>0){
    var yest=new Date();yest.setDate(yest.getDate()-1);
    if(streakData.last===toDS(yest)){streakData.days.push(tod);}
    else{streakData.days=[tod];}
    streakData.last=tod;save();
  }
}
function getStreak(){updateStreak();return streakData.days.length;}

// ── DASHBOARD ──
function renderDash(){
  var tod=nowDS(),nowHour=nowHM();
  var mk=dY+'-'+String(dM+1).padStart(2,'0');
  var mp=pags.filter(function(e){return e.venc&&e.venc.startsWith(mk);});
  var mr=recs.filter(function(e){return e.venc&&e.venc.startsWith(mk);});
  var tPagar=mp.reduce(function(s,e){return s+e.val;},0);
  var tReceber=mr.reduce(function(s,e){return s+e.val;},0);
  var tPago=mp.filter(function(e){return e.status==='pago';}).reduce(function(s,e){return s+e.val;},0);
  var tRecebido=mr.filter(function(e){return e.status==='pago';}).reduce(function(s,e){return s+e.val;},0);
  var saldo=tRecebido-tPago;
  var mxB=Math.max(tReceber,tPagar,0.01);
  var pend=tasks.filter(function(t){return t.status==='pendente';}).length;
  var and=tasks.filter(function(t){return t.status==='andamento';}).length;
  var conc=tasks.filter(function(t){return t.status==='concluido';}).length;
  var canc=tasks.filter(function(t){return t.status==='cancelado';}).length;
  var tot=tasks.length;
  var pct=tot>0?Math.round(conc/tot*100):0;
  var proxTk=tasks.filter(function(t){return t.status!=='concluido'&&t.status!=='cancelado'&&t.data&&t.data>=tod;}).sort(function(a,b){return a.data.localeCompare(b.data);}).slice(0,5);
  var todayEvs=events.filter(function(e){return e.data===tod;}).sort(function(a,b){return a.hora.localeCompare(b.hora);});
  var atrasadas=tasks.filter(function(t){return t.data&&t.data<tod&&t.status!=='concluido'&&t.status!=='cancelado';});
  var vencidas=pags.filter(function(e){return e.status==='vencido'||(e.status==='pendente'&&e.venc&&e.venc<tod);});
  var catMap={};
  pags.filter(function(e){return e.venc&&e.venc.startsWith(mk);}).forEach(function(e){var c=e.cat||'outro';catMap[c]=(catMap[c]||0)+e.val;});
  var catArr=Object.entries(catMap).sort(function(a,b){return b[1]-a[1];}).slice(0,6);
  var maxCat=catArr.length?catArr[0][1]:1;
  var streak=getStreak();

  document.getElementById('dash-body').innerHTML=
    '<div class="dnav">'+
      '<button class="btn" onclick="dN(-1)">&#8249;</button>'+
      '<span class="dlbl">'+MF[dM]+' '+dY+'</span>'+
      '<button class="btn" onclick="dN(1)">&#8250;</button>'+
      '<button class="btn" onclick="dT()">Mês atual</button>'+
    '</div>'+
    '<div class="fin-cards-row">'+
      '<div class="mc"><div class="mc-lbl">A Receber</div><div class="mc-val b">'+R(tReceber)+'</div><div class="mc-sub">'+mr.length+' lançamentos</div></div>'+
      '<div class="mc"><div class="mc-lbl">Recebido</div><div class="mc-val g">'+R(tRecebido)+'</div><div class="mc-sub">'+mr.filter(function(e){return e.status==='pago';}).length+' pagos</div></div>'+
      '<div class="mc"><div class="mc-lbl">A Pagar</div><div class="mc-val r">'+R(tPagar)+'</div><div class="mc-sub">'+mp.length+' lançamentos</div></div>'+
      '<div class="mc"><div class="mc-lbl">Pago</div><div class="mc-val a">'+R(tPago)+'</div><div class="mc-sub">'+mp.filter(function(e){return e.status==='pago';}).length+' pagos</div></div>'+
      '<div class="mc"><div class="mc-lbl">Saldo Líquido</div><div class="mc-val '+(saldo>=0?'g':'r')+'">'+R(saldo)+'</div></div>'+
    '</div>'+
    '<div class="dash-row">'+
      '<div class="dcard">'+
        '<div class="sh"><span class="st">Agenda de hoje — '+todayEvs.length+' compromisso'+(todayEvs.length!==1?'s':'')+'</span><button class="btn" style="font-size:10px" onclick="sw(\'agenda\',null)">ver agenda</button></div>'+
        (todayEvs.length===0?'<div class="empty">Nenhum compromisso hoje</div>':todayEvs.map(function(ev){
          var missed=ev.hora<nowHour&&!ev.confirmed;
          var confirmed=ev.confirmed;
          var cls=missed?'missed':'';
          var dot=missed?'missed-dot':confirmed?'ok-dot':'future-dot';
          return '<div class="ag-hoje-item '+cls+'"><div class="'+dot+'"></div><span class="ag-hoje-time">'+ev.hora+'</span><span class="ag-hoje-title">'+ev.titulo+'</span><span class="ag-hoje-dur">'+ev.dur+'h</span><button class="ag-hoje-conf '+(confirmed?'done':'')+'" onclick="confirmEv(\''+ev.id+'\')">'+(confirmed?'✓ confirmado':'confirmar')+'</button></div>';
        }).join(''))+
      '</div>'+
      '<div class="dcard">'+
        '<div class="sh"><span class="st">Próximas tarefas</span><button class="btn" style="font-size:10px" onclick="sw(\'tarefas\',null)">ver todas</button></div>'+
        (proxTk.length===0?'<div class="empty">Nenhuma tarefa com data futura</div>':proxTk.map(function(t){
          var tc={alta:'ta',media:'tm',baixa:'tb'}[t.prioridade]||'tm';
          var catCls=TK_CAT_CLASS[t.cat||'outro']||'tag-outro';
          var atrasada=t.data<tod;
          return '<div class="tk-prox-item"><span class="tktag '+tc+'">'+t.prioridade+'</span><span class="tk-prox-title" style="'+(atrasada?'color:var(--re)':'')+'">'+t.titulo+'</span><span class="tk-prox-date">'+fd(t.data)+'</span><span class="tag '+catCls+'" style="font-size:9px">'+(t.cat||'outro')+'</span></div>';
        }).join(''))+
      '</div>'+
    '</div>'+
    '<div class="dash-row">'+
      '<div class="prog-card">'+
        '<div class="prog-head"><span class="prog-title">Progresso das tarefas</span><span class="prog-pct">'+pct+'% concluído</span></div>'+
        '<div class="prog-bg"><div class="prog-bar" style="width:'+pct+'%"></div></div>'+
        '<div class="prog-cols">'+
          '<div class="pc"><div class="pc-n" style="color:var(--am)">'+pend+'</div><div class="pc-l">A fazer</div></div>'+
          '<div class="pc"><div class="pc-n" style="color:var(--bl)">'+and+'</div><div class="pc-l">Andamento</div></div>'+
          '<div class="pc"><div class="pc-n" style="color:var(--gr)">'+conc+'</div><div class="pc-l">Concluído</div></div>'+
          '<div class="pc"><div class="pc-n" style="color:var(--t3)">'+canc+'</div><div class="pc-l">Cancelado</div></div>'+
        '</div>'+
      '</div>'+
      '<div class="streak-card">'+
        '<div><div class="streak-num">'+streak+'</div><div class="streak-lbl">dias seguidos</div></div>'+
        '<div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:4px">Sequência de produtividade 🔥</div><div style="font-size:11px;opacity:.65">Conclua ao menos 1 tarefa por dia para manter a sequência.</div></div>'+
      '</div>'+
    '</div>'+
    '<div class="dash-row">'+
      '<div class="dcard"><div class="sh"><span class="st">Fluxo '+MS[dM]+' '+dY+'</span></div><div class="fw">'+
        '<div class="fr2"><span class="flbl2">A receber</span><div class="fbg"><div class="fbar" style="width:'+Math.round(tReceber/mxB*100)+'%;background:var(--bl)"></div></div><span class="fv" style="color:var(--bl)">'+R(tReceber)+'</span></div>'+
        '<div class="fr2"><span class="flbl2">Recebido</span><div class="fbg"><div class="fbar" style="width:'+Math.round(tRecebido/mxB*100)+'%;background:var(--gr)"></div></div><span class="fv" style="color:var(--gr)">'+R(tRecebido)+'</span></div>'+
        '<div class="fr2"><span class="flbl2">A pagar</span><div class="fbg"><div class="fbar" style="width:'+Math.round(tPagar/mxB*100)+'%;background:var(--am)"></div></div><span class="fv" style="color:var(--am)">'+R(tPagar)+'</span></div>'+
        '<div class="fr2"><span class="flbl2">Pago</span><div class="fbg"><div class="fbar" style="width:'+Math.round(tPago/mxB*100)+'%;background:var(--re)"></div></div><span class="fv" style="color:var(--re)">'+R(tPago)+'</span></div>'+
        '<div class="fr2"><span class="flbl2">Saldo</span><div class="fbg"><div class="fbar" style="width:'+Math.round(Math.abs(saldo)/mxB*100)+'%;background:var(--pu)"></div></div><span class="fv" style="color:'+(saldo>=0?'var(--gr)':'var(--re)')+'">'+R(saldo)+'</span></div>'+
      '</div></div>'+
      '<div class="dcard"><div class="sh"><span class="st">Gastos por categoria</span></div>'+
        (catArr.length===0?'<div class="empty">Nenhum gasto lançado</div>':'<div class="cat-chart">'+catArr.map(function(p){return '<div class="cat-bar-row"><span class="cat-bar-lbl">'+p[0]+'</span><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+Math.round(p[1]/maxCat*100)+'%;background:'+(CAT_COLORS[p[0]]||'var(--t2)')+'"></div></div><span class="cat-bar-val">'+R(p[1])+'</span></div>';}).join('')+'</div>')+
      '</div>'+
    '</div>'+
    (atrasadas.length>0||vencidas.length>0?
      '<div class="dcard"><div class="sh"><span class="st" style="color:var(--re)">⚠ Alertas</span></div>'+
      atrasadas.map(function(t){return '<div class="alert-item"><div class="alert-dot" style="background:var(--re)"></div><span style="flex:1">Tarefa atrasada: <b>'+t.titulo+'</b></span><span style="font-size:10px;color:var(--t2);font-family:var(--mono)">'+fd(t.data)+'</span></div>';}).join('')+
      vencidas.map(function(e){return '<div class="alert-item"><div class="alert-dot" style="background:var(--am)"></div><span style="flex:1">Conta vencida: <b>'+e.desc+'</b></span><span style="font-size:11px;color:var(--re);font-family:var(--mono)">'+Rraw(e.val)+'</span></div>';}).join('')+
      '</div>':'');
}
function dN(d){dM+=d;if(dM>11){dM=0;dY++;}if(dM<0){dM=11;dY--;}renderDash();}
function dT(){dM=new Date().getMonth();dY=new Date().getFullYear();renderDash();}
function confirmEv(id){var ev=events.find(function(x){return x.id===id;});if(ev){ev.confirmed=!ev.confirmed;save();renderDash();}}

// ── AGENDA ──
function setAV(v){agV=v;document.getElementById('vts').classList.toggle('on',v==='s');document.getElementById('vtm').classList.toggle('on',v==='m');renderAg();}
function agNav(d){if(agV==='s')agS.setDate(agS.getDate()+d*7);else agMon.setMonth(agMon.getMonth()+d);renderAg();}
function agToday(){agS=new Date();agS.setDate(agS.getDate()-((agS.getDay()+6)%7));agMon=new Date();renderAg();}

function renderAg(){
  var body=document.getElementById('agbody'),lbl=document.getElementById('aglbl');
  body.innerHTML='';
  var tod=nowDS(),nowH=nowHM();
  if(agV==='s'){
    var days=[];for(var i=0;i<7;i++){var dd=new Date(agS);dd.setDate(dd.getDate()+i);days.push(dd);}
    lbl.textContent=days[0].getDate()+' '+MS[days[0].getMonth()]+' — '+days[6].getDate()+' '+MS[days[6].getMonth()]+' '+days[6].getFullYear();
    var wrap=document.createElement('div');wrap.className='ag-week';
    var tc=document.createElement('div');tc.className='ag-tc';
    var th=document.createElement('div');th.style.cssText='height:42px;border-bottom:1px solid var(--b1);flex-shrink:0';tc.appendChild(th);
    HOURS.forEach(function(s){var r=document.createElement('div');r.className='tslot'+(s.half?' half':'');r.innerHTML='<span class="tlbl">'+s.lb+'</span>';tc.appendChild(r);});
    wrap.appendChild(tc);
    var dw=document.createElement('div');dw.className='ag-days';
    days.forEach(function(day){
      var ds=toDS(day),isT=day.toDateString()===new Date().toDateString();
      var col=document.createElement('div');col.className='agcol';
      var ch=document.createElement('div');ch.className='agch'+(isT?' td':'');
      ch.innerHTML=DP[day.getDay()]+'<small>'+(isT?'<span style="background:var(--bl);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:9px">'+day.getDate()+'</span>':day.getDate())+'/'+(day.getMonth()+1)+'</small>';
      col.appendChild(ch);
      var cb=document.createElement('div');cb.className='agcb';cb.style.cssText='height:'+(TS*SLOT_H)+'px;position:relative';
      HOURS.forEach(function(s,idx){
        var sa=document.createElement('div');sa.className='sarea';sa.style.cssText='top:'+(idx*SLOT_H)+'px;height:'+SLOT_H+'px';
        (function(d2,t2){sa.onclick=function(){openEvMo(d2,t2);};})(ds,s.t);
        cb.appendChild(sa);
      });
      events.filter(function(e){return e.data===ds;}).forEach(function(ev){
        var hh=parseInt(ev.hora.split(':')[0]),mm=parseInt(ev.hora.split(':')[1]);
        var si=(hh-7)*2+(mm>=30?1:0);
        var ds2=parseFloat(ev.dur||1)*2;
        var c=COR[ev.cor||'bl'];
        var missed=ds===tod&&ev.hora<nowH&&!ev.confirmed;
        var el=document.createElement('div');
        el.className='sev'+(missed?' missed-ev':'')+(ev.confirmed?' confirmed-ev':'');
        if(!missed){el.style.cssText='top:'+(si*SLOT_H+2)+'px;height:'+Math.max(ds2*SLOT_H-4,SLOT_H-4)+'px;background:'+c.bg+';border-left-color:'+c.bd+';color:'+c.tx;}
        else{el.style.cssText='top:'+(si*SLOT_H+2)+'px;height:'+Math.max(ds2*SLOT_H-4,SLOT_H-4)+'px';}
        el.innerHTML='<div class="sev-t">'+ev.titulo+(missed?' ⚠':ev.confirmed?' ✓':'')+'</div><div class="sev-s">'+ev.hora+' · '+ev.dur+'h</div><span class="dx" onclick="clickDelEv(\''+ev.id+'\',event)">✕</span>';
        (function(eid){el.onclick=function(e){if(!e.target.classList.contains('dx'))openEvEdit(eid);};})(ev.id);
        el.draggable=true;
        (function(eid){el.ondragstart=function(e){e.dataTransfer.setData('evId',eid);e.stopPropagation();};})(ev.id);
        cb.appendChild(el);
      });
      cb.ondragover=function(e){e.preventDefault();};
      (function(d2){cb.ondrop=function(e){
        e.preventDefault();var evId=e.dataTransfer.getData('evId');if(!evId)return;
        var rect=cb.getBoundingClientRect();var ry=e.clientY-rect.top;
        var idx=Math.max(0,Math.floor(ry/SLOT_H));var hh2=7+Math.floor(idx/2);var mm2=idx%2===0?'00':'30';
        var ev2=events.find(function(x){return x.id===evId;});
        if(ev2){ev2.data=d2;ev2.hora=String(hh2).padStart(2,'0')+':'+mm2;save();renderAg();}
      };})(ds);
      col.appendChild(cb);dw.appendChild(col);
    });
    var sy=false;var cols=Array.from(dw.querySelectorAll('.agcol'));
    cols.forEach(function(c){c.addEventListener('scroll',function(){if(sy)return;sy=true;cols.forEach(function(x){if(x!==c)x.scrollTop=c.scrollTop;});tc.scrollTop=c.scrollTop;sy=false;});});
    wrap.appendChild(dw);body.appendChild(wrap);
    setTimeout(function(){var fc=dw.querySelector('.agcol');if(fc){var p=nowH.split(':').map(Number);var idx=Math.max(0,((p[0]-7)*2)+(p[1]>=30?1:0)-2);var t2=idx*SLOT_H;fc.scrollTop=t2;tc.scrollTop=t2;cols.forEach(function(c){c.scrollTop=t2;});}},60);
  } else {
    var yr=agMon.getFullYear(),mn=agMon.getMonth();
    lbl.textContent=MF[mn]+' '+yr;
    var wrap2=document.createElement('div');wrap2.className='ag-month';
    wrap2.innerHTML='<div class="mgh-r">'+DP.map(function(d){return'<div class="mgh">'+d+'</div>';}).join('')+'</div>';
    var grid=document.createElement('div');grid.className='mgrid';
    var first=new Date(yr,mn,1),sd=(first.getDay()+6)%7,dim=new Date(yr,mn+1,0).getDate();
    for(var i2=0;i2<sd;i2++){var pd=new Date(yr,mn,1-sd+i2);var cc=document.createElement('div');cc.className='mday om';cc.innerHTML='<div class="dnum">'+pd.getDate()+'</div>';grid.appendChild(cc);}
    for(var d2=1;d2<=dim;d2++){
      var ds2=toDS(new Date(yr,mn,d2));
      var devs=events.filter(function(e){return e.data===ds2;});
      var cc2=document.createElement('div');cc2.className='mday';
      var isToday=ds2===tod;
      (function(d3){cc2.onclick=function(){openEvMo(d3,'09:00');};})(ds2);
      cc2.innerHTML='<div class="dnum">'+(isToday?'<span class="today">'+d2+'</span>':d2)+'</div>'+
        devs.slice(0,3).map(function(e){var cor=COR[e.cor||'bl'];var missed=ds2===tod&&e.hora<nowHM()&&!e.confirmed;return'<div class="mev" style="color:'+(missed?'var(--re)':cor.tx)+';background:'+(missed?'var(--rbg)':cor.bg)+'">'+e.hora+' '+e.titulo+'</div>';}).join('')+
        (devs.length>3?'<div style="font-size:9px;color:var(--t3)">+'+(devs.length-3)+'</div>':'');
      grid.appendChild(cc2);
    }
    wrap2.appendChild(grid);body.appendChild(wrap2);
  }
}
function openEvMo(d,h){editEvId=null;document.getElementById('mo-ev-t').textContent='Novo evento';document.getElementById('ev-d').value=d;document.getElementById('ev-h').value=h;document.getElementById('ev-t').value='';document.getElementById('ev-dur').value='1';document.getElementById('ev-cor').value='bl';document.getElementById('ev-nota').value='';document.getElementById('ev-rep').value='';document.getElementById('ev-rep-until').value='';document.getElementById('ev-del-btn').style.display='none';omo('mo-ev');setTimeout(function(){document.getElementById('ev-t').focus();},50);}
function openEvEdit(id){var ev=events.find(function(x){return x.id===id;});if(!ev)return;editEvId=id;document.getElementById('mo-ev-t').textContent='Editar evento';document.getElementById('ev-d').value=ev.data;document.getElementById('ev-h').value=ev.hora;document.getElementById('ev-t').value=ev.titulo;document.getElementById('ev-dur').value=String(ev.dur||1);document.getElementById('ev-cor').value=ev.cor||'bl';document.getElementById('ev-nota').value=ev.nota||'';document.getElementById('ev-rep').value=ev.rep||'';document.getElementById('ev-rep-until').value=ev.repUntil||'';document.getElementById('ev-del-btn').style.display='block';omo('mo-ev');setTimeout(function(){document.getElementById('ev-t').focus();},50);}
function saveEv(){
  var t=document.getElementById('ev-t').value.trim();if(!t)return;
  var rep=document.getElementById('ev-rep').value;
  var repUntil=document.getElementById('ev-rep-until').value;
  if(editEvId){
    var ev=events.find(function(x){return x.id===editEvId;});
    ev.titulo=t;ev.data=document.getElementById('ev-d').value;ev.hora=document.getElementById('ev-h').value;
    ev.dur=parseFloat(document.getElementById('ev-dur').value);ev.cor=document.getElementById('ev-cor').value;
    ev.nota=document.getElementById('ev-nota').value;ev.rep=rep;ev.repUntil=repUntil;
  } else {
    var base={id:Date.now().toString(),titulo:t,data:document.getElementById('ev-d').value,hora:document.getElementById('ev-h').value,dur:parseFloat(document.getElementById('ev-dur').value),cor:document.getElementById('ev-cor').value,nota:document.getElementById('ev-nota').value,rep:rep,repUntil:repUntil,confirmed:false};
    events.push(base);
    if(rep&&repUntil&&repUntil>base.data){
      var next=nextRepeatDate(base.data,rep);
      while(next<=repUntil){
        events.push({id:Date.now().toString()+Math.random(),titulo:base.titulo,data:next,hora:base.hora,dur:base.dur,cor:base.cor,nota:base.nota,rep:base.rep,repUntil:base.repUntil,confirmed:false});
        next=nextRepeatDate(next,rep);
      }
    }
  }
  save();cmo('mo-ev');renderAg();if(document.getElementById('view-dash').classList.contains('on'))renderDash();
}
function clickDelEv(id,e){e.stopPropagation();events=events.filter(function(x){return x.id!==id;});save();renderAg();}

function processRepeatTasks(){
  var tod=nowDS();var changed=false;
  tasks.filter(function(t){return t.rep;}).forEach(function(root){
    var rootId=root.repRoot||root.id;
    var family=tasks.filter(function(x){return(x.repRoot||x.id)===rootId;});
    var latest=family.sort(function(a,b){return(a.data||'').localeCompare(b.data||'');})[family.length-1]||root;
    var nextDate=nextRepeatDate(latest.data||root.data||tod,root.rep);
    var limit=root.repUntil||latest.repUntil||'';
    while(nextDate<=tod&&(!limit||nextDate<=limit)){
      var exists=tasks.find(function(x){return(x.repRoot||x.id)===rootId&&x.data===nextDate;});
      if(!exists){
        var newTask2=JSON.parse(JSON.stringify(latest));
        newTask2.id=Date.now().toString()+Math.random();
        newTask2.status='pendente';newTask2.completedAt=null;newTask2.data=nextDate;newTask2.repParent=latest.id;newTask2.repRoot=rootId;
        tasks.push(newTask2);changed=true;
      }
      family=tasks.filter(function(x){return(x.repRoot||x.id)===rootId;});
      latest=family.sort(function(a,b){return(a.data||'').localeCompare(b.data||'');})[family.length-1]||latest;
      nextDate=nextRepeatDate(latest.data||nextDate,root.rep);
    }
  });
  if(changed)save();
}

function fT(){fM=new Date().getMonth();fY=new Date().getFullYear();renderFin();}
function oFinMo(tipo){refreshFinCategoryOptions();finTipo=tipo;editFinId=null;document.getElementById('mo-fin-t').textContent=tipo==='pag'?'Nova conta a pagar':'Novo recebimento';document.getElementById('fin-desc').value='';document.getElementById('fin-val').value='';document.getElementById('fin-venc').value='';document.getElementById('fin-cat').value='fornecedor';document.getElementById('fin-st').value='pendente';document.getElementById('fin-nf').value='';document.getElementById('fin-del-btn').style.display='none';omo('mo-fin');}
function editFinEntry(tipo,id){finTipo=tipo;editFinId=id;var arr=tipo==='pag'?pags:recs;var e=arr.find(function(x){return x.id===id;});if(!e)return;document.getElementById('mo-fin-t').textContent=tipo==='pag'?'Editar pagamento':'Editar recebimento';document.getElementById('fin-desc').value=e.desc;document.getElementById('fin-val').value=e.val;document.getElementById('fin-venc').value=e.venc||'';document.getElementById('fin-cat').value=e.cat||'outro';document.getElementById('fin-st').value=e.status;document.getElementById('fin-nf').value=e.nf||'';document.getElementById('fin-del-btn').style.display='block';omo('mo-fin');}
function delFinEdit(){if(finTipo==='pag')pags=pags.filter(function(x){return x.id!==editFinId;});else recs=recs.filter(function(x){return x.id!==editFinId;});save();cmo('mo-fin');renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash();}
function saveFinEntry(){
  var d=document.getElementById('fin-desc').value.trim();
  var v=parseFloat(document.getElementById('fin-val').value);
  if(!d||!v)return;
  if(editFinId){
    var arr=finTipo==='pag'?pags:recs;
    var e=arr.find(function(x){return x.id===editFinId;});
    if(e){e.desc=d;e.val=v;e.venc=document.getElementById('fin-venc').value;e.cat=document.getElementById('fin-cat').value;e.status=document.getElementById('fin-st').value;e.nf=document.getElementById('fin-nf').value;}
  } else {
    var e2={id:Date.now().toString(),desc:d,val:v,venc:document.getElementById('fin-venc').value,cat:document.getElementById('fin-cat').value,status:document.getElementById('fin-st').value,nf:document.getElementById('fin-nf').value};
    if(finTipo==='pag')pags.push(e2);else recs.push(e2);
  }
  save();cmo('mo-fin');renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash();
}
function tgSt(tipo,id){var arr=tipo==='pag'?pags:recs;var e=arr.find(function(x){return x.id===id;});if(!e)return;var c={pendente:'pago',pago:'vencido',vencido:'pendente'};e.status=c[e.status]||'pendente';save();renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash();}
function dFin(tipo,id){if(tipo==='pag')pags=pags.filter(function(x){return x.id!==id;});else recs=recs.filter(function(x){return x.id!==id;});save();renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash();}

// ── VENDAS ──
function renderVendas(){
  var mk=vY+'-'+String(vM+1).padStart(2,'0');
  var arr=vendas.filter(function(v){return!v.data||v.data.startsWith(mk);});
  if(vendaEmpresaFilter)arr=arr.filter(function(v){return(v.empresa||'')===vendaEmpresaFilter;});
  if(vendaLojaFilter)arr=arr.filter(function(v){return(v.loja||'')===vendaLojaFilter;});
  var bruto=arr.reduce(function(s,v){return s+(Number(v.bruto)||0);},0);
  var liquido=arr.reduce(function(s,v){return s+(Number(v.liquido)||0);},0);
  var qtd=arr.reduce(function(s,v){return s+(Number(v.qtd)||0);},0);
  var pedidos=arr.reduce(function(s,v){return s+(Number(v.pedidos)||0);},0);
  var ticket=pedidos?bruto/pedidos:0;
  var empresas=[...new Set(vendas.map(function(v){return v.empresa;}).filter(Boolean))].sort();
  var lojas=[...new Set(vendas.map(function(v){return v.loja;}).filter(Boolean))].sort();
  var porEmpresa={},porLoja={};
  arr.forEach(function(v){var em=v.empresa||'Sem empresa';var lo=v.loja||'Sem loja';porEmpresa[em]=(porEmpresa[em]||0)+(Number(v.bruto)||0);porLoja[lo]=(porLoja[lo]||0)+(Number(v.bruto)||0);});
  var wrap=document.getElementById('vendaswrap');
  wrap.innerHTML='<div class="finnav">'+
    '<button onclick="vN(-1)">&#8249;</button><span class="finlbl">'+MF[vM]+' '+vY+'</span><button onclick="vN(1)">&#8250;</button>'+
    '<button class="btn" onclick="vT()">Mês atual</button><span style="flex:1"></span>'+
    '<button class="btn btnp" onclick="openVendaMo()">+ Lançar venda</button></div>'+
    '<div class="fin-cards-row">'+
      '<div class="mc"><div class="mc-lbl">Faturamento bruto</div><div class="mc-val b">'+R(bruto)+'</div></div>'+
      '<div class="mc"><div class="mc-lbl">Valor líquido</div><div class="mc-val g">'+R(liquido)+'</div></div>'+
      '<div class="mc"><div class="mc-lbl">Qtd vendida</div><div class="mc-val a">'+qtd+'</div></div>'+
      '<div class="mc"><div class="mc-lbl">Pedidos</div><div class="mc-val p">'+pedidos+'</div></div>'+
      '<div class="mc"><div class="mc-lbl">Ticket médio</div><div class="mc-val">'+R(ticket)+'</div></div>'+
    '</div>'+
    '<div class="finsec"><div class="sh"><span class="st">Filtros</span></div>'+
    '<div style="padding:12px 14px;display:grid;grid-template-columns:1fr 1fr auto;gap:10px">'+
      '<select class="fi" onchange="setVendaEmpresaFilter(this.value)"><option value="">Todas as empresas</option>'+empresas.map(function(e){return'<option value="'+e+'"'+(vendaEmpresaFilter===e?' selected':'')+'>'+e+'</option>';}).join('')+'</select>'+
      '<select class="fi" onchange="setVendaLojaFilter(this.value)"><option value="">Todas as lojas</option>'+lojas.map(function(l){return'<option value="'+l+'"'+(vendaLojaFilter===l?' selected':'')+'>'+l+'</option>';}).join('')+'</select>'+
      '<button class="btn" onclick="clearVendaFilters()">Limpar</button>'+
    '</div></div>'+
    '<div class="dash-row">'+
      '<div class="dcard"><div class="sh"><span class="st">Totais por empresa</span></div>'+
        (Object.keys(porEmpresa).length===0?'<div class="empty">Nenhuma venda</div>':'<div class="cat-chart">'+Object.entries(porEmpresa).sort(function(a,b){return b[1]-a[1];}).map(function(p){var mx=Math.max.apply(null,Object.values(porEmpresa).concat([1]));return'<div class="cat-bar-row"><span class="cat-bar-lbl" style="width:120px">'+p[0]+'</span><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+Math.round(p[1]/mx*100)+'%;background:var(--bl)"></div></div><span class="cat-bar-val">'+R(p[1])+'</span></div>';}).join('')+'</div>')+
      '</div>'+
      '<div class="dcard"><div class="sh"><span class="st">Totais por loja</span></div>'+
        (Object.keys(porLoja).length===0?'<div class="empty">Nenhuma venda</div>':'<div class="cat-chart">'+Object.entries(porLoja).sort(function(a,b){return b[1]-a[1];}).map(function(p){var mx=Math.max.apply(null,Object.values(porLoja).concat([1]));return'<div class="cat-bar-row"><span class="cat-bar-lbl" style="width:120px">'+p[0]+'</span><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:'+Math.round(p[1]/mx*100)+'%;background:var(--gr)"></div></div><span class="cat-bar-val">'+R(p[1])+'</span></div>';}).join('')+'</div>')+
      '</div>'+
    '</div>'+
    '<div class="finsec"><div class="sh"><span class="st">Lançamentos — '+arr.length+' registro(s)</span></div>'+
      (arr.length===0?'<div class="empty">Nenhuma apuração nesse período</div>':
      '<table class="ftable"><thead><tr><th>Data</th><th>Empresa</th><th>Loja</th><th>Qtd</th><th>Pedidos</th><th>Bruto</th><th>Líquido</th><th></th></tr></thead><tbody>'+
      arr.sort(function(a,b){return(b.data||'').localeCompare(a.data||'');}).map(function(v){
        return'<tr><td style="font-family:var(--mono)">'+fd(v.data)+'</td><td style="font-weight:500">'+(v.empresa||'—')+'</td><td>'+(v.loja||'—')+'</td><td>'+(v.qtd||0)+'</td><td>'+(v.pedidos||0)+'</td><td style="color:var(--bl);font-family:var(--mono)">'+R(v.bruto||0)+'</td><td style="color:var(--gr);font-family:var(--mono)">'+R(v.liquido||0)+'</td>'+
        '<td style="display:flex;gap:4px"><button class="btn" style="padding:2px 7px;font-size:10px" onclick="editVenda(\''+v.id+'\')">✎</button><button class="btn btnd" style="padding:2px 7px;font-size:10px" onclick="delVenda(\''+v.id+'\')">✕</button></td></tr>'+
        (v.obs?'<tr><td></td><td colspan="6" style="font-size:11px;color:var(--t2)">Obs.: '+v.obs+'</td><td></td></tr>':'');
      }).join('')+'</tbody></table>')+
    '</div>';
}
function vN(d){vM+=d;if(vM>11){vM=0;vY++;}if(vM<0){vM=11;vY--;}renderVendas();}
function vT(){vM=new Date().getMonth();vY=new Date().getFullYear();renderVendas();}
function setVendaEmpresaFilter(v){vendaEmpresaFilter=v;renderVendas();}
function setVendaLojaFilter(v){vendaLojaFilter=v;renderVendas();}
function clearVendaFilters(){vendaEmpresaFilter='';vendaLojaFilter='';renderVendas();}
function openVendaMo(){editVendaId=null;document.getElementById('mo-venda-t').textContent='Nova apuração de vendas';document.getElementById('vd-empresa').value='';document.getElementById('vd-loja').value='';document.getElementById('vd-data').value=nowDS();document.getElementById('vd-qtd').value='';document.getElementById('vd-pedidos').value='';document.getElementById('vd-bruto').value='';document.getElementById('vd-liquido').value='';document.getElementById('vd-obs').value='';document.getElementById('vd-del-btn').style.display='none';omo('mo-venda');}
function editVenda(id){var v=vendas.find(function(x){return x.id===id;});if(!v)return;editVendaId=id;document.getElementById('mo-venda-t').textContent='Editar apuração';document.getElementById('vd-empresa').value=v.empresa||'';document.getElementById('vd-loja').value=v.loja||'';document.getElementById('vd-data').value=v.data||'';document.getElementById('vd-qtd').value=v.qtd||'';document.getElementById('vd-pedidos').value=v.pedidos||'';document.getElementById('vd-bruto').value=v.bruto||'';document.getElementById('vd-liquido').value=v.liquido||'';document.getElementById('vd-obs').value=v.obs||'';document.getElementById('vd-del-btn').style.display='block';omo('mo-venda');}
function saveVenda(){
  var empresa=document.getElementById('vd-empresa').value.trim();
  var loja=document.getElementById('vd-loja').value.trim();
  var data=document.getElementById('vd-data').value;
  if(!empresa||!loja||!data){alert('Preencha empresa, loja e data.');return;}
  var item={empresa:empresa,loja:loja,data:data,qtd:Number(document.getElementById('vd-qtd').value||0),pedidos:Number(document.getElementById('vd-pedidos').value||0),bruto:Number(document.getElementById('vd-bruto').value||0),liquido:Number(document.getElementById('vd-liquido').value||0),obs:document.getElementById('vd-obs').value.trim()};
  if(editVendaId){var v=vendas.find(function(x){return x.id===editVendaId;});Object.assign(v,item);}
  else{vendas.push(Object.assign({id:Date.now().toString()},item));}
  save();cmo('mo-venda');renderVendas();
}
function delVendaEdit(){vendas=vendas.filter(function(x){return x.id!==editVendaId;});save();cmo('mo-venda');renderVendas();}
function delVenda(id){vendas=vendas.filter(function(x){return x.id!==id;});save();renderVendas();}

// ── PDF ──
function exportPDF(){
  try{
    var jspdf=window.jspdf;var doc=new jspdf.jsPDF();
    var tod=nowDS();var mk=dY+'-'+String(dM+1).padStart(2,'0');
    doc.setFontSize(18);doc.setFont('helvetica','bold');doc.text('Lucas OS \u2014 Relat\u00f3rio Mensal',14,20);
    doc.setFontSize(11);doc.setFont('helvetica','normal');doc.text(MF[dM]+' '+dY+'   |   Gerado em '+fd(tod),14,28);
    doc.setDrawColor(200);doc.line(14,32,196,32);
    var y=40;
    var ap=pags.filter(function(e){return e.venc&&e.venc.startsWith(mk);});
    var ar=recs.filter(function(e){return e.venc&&e.venc.startsWith(mk);});
    var tP=ap.reduce(function(s,e){return s+e.val;},0),tR=ar.reduce(function(s,e){return s+e.val;},0);
    var tPg=ap.filter(function(e){return e.status==='pago';}).reduce(function(s,e){return s+e.val;},0);
    var tRc=ar.filter(function(e){return e.status==='pago';}).reduce(function(s,e){return s+e.val;},0);
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Financeiro',14,y);y+=8;
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text('A Receber: '+Rraw(tR)+'  Recebido: '+Rraw(tRc)+'  A Pagar: '+Rraw(tP)+'  Pago: '+Rraw(tPg)+'  Saldo: '+Rraw(tRc-tPg),14,y);y+=10;
    if(ap.length>0){doc.setFont('helvetica','bold');doc.text('Contas a Pagar:',14,y);y+=6;doc.setFont('helvetica','normal');ap.forEach(function(e){if(y>270){doc.addPage();y=20;}doc.text('- '+e.desc+' - '+Rraw(e.val)+' - '+fd(e.venc)+' - '+e.status+(e.nf?' ['+e.nf+']':''),16,y);y+=5;});y+=4;}
    if(ar.length>0){doc.setFont('helvetica','bold');doc.text('Contas a Receber:',14,y);y+=6;doc.setFont('helvetica','normal');ar.forEach(function(e){if(y>270){doc.addPage();y=20;}doc.text('- '+e.desc+' - '+Rraw(e.val)+' - '+fd(e.venc)+' - '+e.status+(e.nf?' ['+e.nf+']':''),16,y);y+=5;});y+=4;}
    if(y>240){doc.addPage();y=20;}
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Tarefas',14,y);y+=8;
    [{s:'pendente',l:'A fazer'},{s:'andamento',l:'Em andamento'},{s:'concluido',l:'Concluido'}].forEach(function(p){
      var ct=tasks.filter(function(t){return t.status===p.s;});if(ct.length===0)return;
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text(p.l+' ('+ct.length+'):',14,y);y+=5;doc.setFont('helvetica','normal');
      ct.slice(0,10).forEach(function(t){if(y>270){doc.addPage();y=20;}doc.text('- '+t.titulo+' ['+t.prioridade+']'+(t.delegado?' > '+t.delegado:'')+(t.data?' - '+fd(t.data):''),16,y);y+=5;});y+=3;
    });
    doc.save('lucas-os-'+mk+'.pdf');
  }catch(err){alert('Erro ao gerar PDF: '+err.message);}
}

// ── INIT ──
// Aguarda Firebase antes de carregar; se não vier em 4s, usa localStorage
window.addEventListener("firebase-ready", function() {
  if (!window._appBooted) {
    window._appBooted = true;
    loadFromFirestore();
  }
});
setTimeout(function() {
  if (!window._appBooted) {
    window._appBooted = true;
    console.warn("Firebase demorou — carregando com localStorage");
    loadFromFirestore();
  }
}, 4000);
</script>
