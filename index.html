<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucas OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f6f6f4;--bg1:#fff;--bg2:#f1f1ef;--bg3:#e6e6e2;--bg4:#ccccc6;
  --b1:rgba(0,0,0,0.07);--b2:rgba(0,0,0,0.14);--b3:rgba(0,0,0,0.24);
  --t1:#111;--t2:#5a5a5a;--t3:#aaa;
  --gr:#1a9e62;--gbg:#e6f7ef;--gbdr:rgba(26,158,98,.25);
  --re:#d03030;--rbg:#fdeaea;--rbdr:rgba(208,48,48,.25);
  --bl:#2563eb;--bbg:#eff4ff;--bbdr:rgba(37,99,235,.25);
  --am:#b87300;--abg:#fff3d0;--abdr:rgba(184,115,0,.25);
  --pu:#6d4fc2;--pubg:#f0ebff;--pubdr:rgba(109,79,194,.25);
  --or:#d4580a;--orbg:#fff0e6;
  --sb:224px;--r:8px;--rl:12px;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --slot:38px;
}
body{font-family:var(--sans);background:var(--bg);color:var(--t1);font-size:13px;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ── SIDEBAR ── */
.sb{width:var(--sb);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh;transition:width .2s;overflow:hidden}
.sb.col{width:52px}
.sb-top{padding:14px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);flex-shrink:0;min-height:52px}
.sb-brand{font-family:var(--mono);font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;transition:opacity .15s}
.sb.col .sb-brand{opacity:0;width:0}
.sb-tog{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--b1);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);font-size:16px}
.sb-tog:hover{background:var(--bg2)}
.sb-nav{padding:8px;flex:1;display:flex;flex-direction:column;gap:2px}
.sbi{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);cursor:pointer;white-space:nowrap;border:none;background:transparent;width:100%;text-align:left;font-family:var(--sans);font-size:13px;color:var(--t2);transition:all .15s}
.sbi:hover{background:var(--bg2);color:var(--t1)}.sbi.on{background:var(--bg2);color:var(--t1);font-weight:500}
.sbi-ic{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.sbi-lb{overflow:hidden;white-space:nowrap;transition:opacity .15s}
.sb.col .sbi-lb{opacity:0;width:0}
.sb-foot{padding:8px;border-top:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;gap:2px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:52px;border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0;background:var(--bg1)}
.topbar-t{font-size:14px;font-weight:500;flex:1}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}.view.on{display:flex}

/* ── SHARED ── */
.btn{padding:5px 12px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.btn:hover{background:var(--bg2);color:var(--t1)}.btnp{background:var(--t1);color:#fff;border-color:var(--t1)}.btnp:hover{opacity:.85}
.btnd{color:var(--re)}.btnd:hover{background:var(--rbg);border-color:var(--rbdr)}
.sh{padding:9px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg1)}
.st{font-size:10px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.07em}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer}
.p-pago{background:var(--gbg);color:var(--gr)}.p-pendente{background:var(--abg);color:var(--am)}.p-vencido{background:var(--rbg);color:var(--re)}
.empty{padding:20px;font-size:12px;color:var(--t3);text-align:center}
.tag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.tag-trab{background:#e0f0ff;color:#1a5fb5}.tag-casa{background:#e8f5e8;color:#2e7d32}
.tag-pess{background:var(--pubg);color:var(--pu)}.tag-facu{background:var(--abg);color:var(--am)}
.tag-imp{background:#ffe8d0;color:var(--or)}.tag-mkt{background:#fce8ff;color:#8b2fc9}
.tag-forn{background:var(--gbg);color:var(--gr)}.tag-outro{background:var(--bg3);color:var(--t2)}

/* ── MODAL ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:300;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mbox{background:var(--bg1);border-radius:var(--rl) var(--rl) 0 0;padding:20px;width:100%;max-width:520px;border:1px solid var(--b1);border-bottom:none;max-height:88vh;overflow-y:auto;box-shadow:0 -6px 30px rgba(0,0,0,.1)}
.mbox h3{font-size:13px;font-weight:500;margin-bottom:14px}
.fl{margin-bottom:10px}.fl label{font-size:11px;color:var(--t2);margin-bottom:4px;display:block;font-weight:500}
.fi{width:100%;padding:8px 10px;border:1px solid var(--b2);border-radius:var(--r);background:var(--bg);color:var(--t1);font-size:13px;font-family:var(--sans);outline:none;transition:border .15s}
.fi:focus{border-color:var(--bl)}.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}

/* ── DASHBOARD ── */
.dash{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.dash-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.dcard{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.dnav{display:flex;align-items:center;gap:10px}
.dlbl{font-size:15px;font-weight:500;min-width:150px}
/* metric cards */
.mcards{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.mc{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:12px 14px}
.mc-lbl{font-size:10px;color:var(--t2);margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}
.mc-val{font-family:var(--mono);font-size:18px;font-weight:400}
.mc-val.g{color:var(--gr)}.mc-val.r{color:var(--re)}.mc-val.b{color:var(--bl)}.mc-val.a{color:var(--am)}.mc-val.p{color:var(--pu)}
.mc-sub{font-size:10px;color:var(--t3);margin-top:3px}
/* agenda hoje */
.ag-hoje-item{padding:9px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:10px;font-size:13px}
.ag-hoje-item:last-child{border-bottom:none}
.ag-hoje-item.missed{background:var(--rbg)}
.ag-hoje-item.now{background:var(--bbg)}
.ag-hoje-time{font-family:var(--mono);font-size:11px;width:44px;flex-shrink:0;color:var(--t2)}
.ag-hoje-title{flex:1;font-weight:500}
.ag-hoje-dur{font-size:10px;color:var(--t3)}
.ag-hoje-conf{padding:3px 8px;border-radius:20px;border:1px solid var(--b1);background:transparent;font-size:10px;cursor:pointer;font-family:var(--sans);transition:all .15s;white-space:nowrap}
.ag-hoje-conf:hover{background:var(--gbg);color:var(--gr);border-color:var(--gbdr)}
.ag-hoje-conf.done{background:var(--gbg);color:var(--gr);border-color:transparent}
.missed-dot{width:8px;height:8px;border-radius:50%;background:var(--re);flex-shrink:0}
.ok-dot{width:8px;height:8px;border-radius:50%;background:var(--gr);flex-shrink:0}
.future-dot{width:8px;height:8px;border-radius:50%;background:var(--bl);flex-shrink:0}
/* prog */
.prog-card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px 16px}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.prog-title{font-size:10px;font-weight:500;color:var(--t2);text-transform:uppercase;letter-spacing:.07em}
.prog-pct{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--gr)}
.prog-bg{height:7px;background:var(--bg3);border-radius:20px;overflow:hidden;margin-bottom:12px}
.prog-bar{height:100%;border-radius:20px;background:var(--gr);transition:width .5s}
.prog-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.pc{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:8px 10px;text-align:center}
.pc-n{font-family:var(--mono);font-size:17px;font-weight:400;margin-bottom:2px}
.pc-l{font-size:10px;color:var(--t3)}
/* streak */
.streak-card{background:var(--t1);color:#fff;border-radius:var(--rl);padding:14px 16px;display:flex;align-items:center;gap:14px}
.streak-num{font-family:var(--mono);font-size:32px;font-weight:300;line-height:1}
.streak-lbl{font-size:12px;opacity:.7;margin-top:3px}
/* fluxo barras */
.fw{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.fr2{display:flex;align-items:center;gap:10px}
.flbl2{font-size:11px;color:var(--t2);width:88px;flex-shrink:0;font-weight:500}
.fbg{flex:1;height:6px;background:var(--bg3);border-radius:20px;overflow:hidden}
.fbar{height:100%;border-radius:20px}
.fv{font-size:11px;font-family:var(--mono);min-width:86px;text-align:right}
/* alertas */
.alert-item{padding:9px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:9px;font-size:12px}
.alert-item:last-child{border-bottom:none}
.alert-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* grafico pizza simples */
.cat-chart{padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.cat-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}
.cat-bar-lbl{width:80px;flex-shrink:0;font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-bar-bg{flex:1;height:8px;background:var(--bg3);border-radius:20px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:20px}
.cat-bar-val{font-family:var(--mono);font-size:10px;min-width:60px;text-align:right;color:var(--t2)}
/* tarefas proximas */
.tk-prox-item{padding:8px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:8px;font-size:12px}
.tk-prox-item:last-child{border-bottom:none}
.tk-prox-title{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tk-prox-date{font-size:10px;color:var(--t2);font-family:var(--mono)}

/* ── AGENDA ── */
.agh{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg1)}
.agnav{display:flex;gap:4px}
.agnav button{padding:4px 10px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;font-family:var(--sans);transition:all .15s}
.agnav button:hover{background:var(--bg2);color:var(--t1)}
.aglbl{font-size:13px;font-weight:500;flex:1}
.vtog{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:3px}
.vt{padding:4px 12px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.vt.on{background:var(--bg1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.ag-week{display:flex;flex:1;overflow:hidden}
.ag-tc{width:46px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--b1)}
.ag-tc::-webkit-scrollbar{display:none}
.ag-days{display:flex;flex:1;overflow:hidden}
.agcol{flex:1;overflow-y:auto;border-right:1px solid var(--b1);min-width:0;position:relative}
.agcol:last-child{border-right:none}
.agcol::-webkit-scrollbar{display:none}
.agch{position:sticky;top:0;background:var(--bg1);padding:9px 4px;border-bottom:1px solid var(--b1);font-size:11px;font-weight:500;z-index:10;text-align:center}
.agch small{display:block;font-size:10px;font-weight:400;color:var(--t2);margin-top:2px}
.agch.td{color:var(--bl)}
.agcb{position:relative}
.tslot{height:var(--slot);border-bottom:1px solid var(--b1)}
.tslot.half{border-bottom:1px dashed rgba(0,0,0,.04)}
.ag-tc .tslot{display:flex;align-items:flex-start;padding:2px 6px 0;justify-content:flex-end}
.tlbl{font-size:9px;color:var(--t3);font-family:var(--mono);line-height:1}
.tslot.half .tlbl{opacity:0}
.sarea{position:absolute;left:0;right:0;cursor:pointer}
.sarea:hover{background:rgba(37,99,235,.04)}
.sev{position:absolute;left:3px;right:3px;border-left-width:3px;border-left-style:solid;border-radius:6px;padding:4px 7px;font-size:11px;font-weight:500;overflow:hidden;cursor:pointer;z-index:5}
.sev.missed-ev{border-left-color:var(--re)!important;background:var(--rbg)!important;color:var(--re)!important}
.sev.confirmed-ev{opacity:.7}
.sev .dx{position:absolute;top:4px;right:5px;opacity:0;cursor:pointer;font-size:11px;background:rgba(255,255,255,.9);border-radius:3px;padding:0 3px;line-height:1.5;color:var(--re)}
.sev:hover .dx{opacity:1}
.sev-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px;margin-bottom:1px}
.sev-s{font-size:9px;opacity:.65;font-family:var(--mono)}
.ag-month{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mgh-r{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--b1);flex-shrink:0}
.mgh{padding:7px 4px;font-size:10px;color:var(--t2);text-align:center;text-transform:uppercase;letter-spacing:.05em;font-weight:500}
.mgrid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto;align-content:start}
.mday{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);min-height:72px;padding:6px;cursor:pointer;overflow:hidden;transition:background .1s}
.mday:nth-child(7n){border-right:none}.mday:hover{background:var(--bg2)}
.mday.om .dnum{color:var(--t3)}
.dnum{font-size:11px;color:var(--t2);margin-bottom:4px;font-weight:500}
.dnum.today{background:var(--bl);color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
.mev{font-size:9px;border-radius:4px;padding:2px 5px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── TAREFAS ── */
.tk-header{padding:8px 14px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg1);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.tk-filter-btn{padding:4px 10px;border-radius:20px;border:1px solid var(--b1);background:var(--bg);color:var(--t2);cursor:pointer;font-size:11px;font-family:var(--sans);transition:all .15s}
.tk-filter-btn:hover{border-color:var(--b2);color:var(--t1)}
.tk-filter-btn.on{background:var(--t1);color:#fff;border-color:var(--t1)}
.tklayout{display:flex;flex:1;overflow:hidden}
.tkcol{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--b1);overflow:hidden;min-width:140px}
.tkcol:last-child{border-right:none}
.tkch{padding:9px 12px 8px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg1)}
.tkct{font-size:11px;font-weight:500}
.tkcn{font-size:10px;background:var(--bg2);border-radius:20px;padding:1px 8px;color:var(--t2)}
.tklist{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px}
.tkcard{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--r);padding:9px 11px;cursor:grab;user-select:none;transition:all .15s}
.tkcard:hover{border-color:var(--b2);box-shadow:0 2px 8px rgba(0,0,0,.06)}.tkcard.dr{opacity:.3;cursor:grabbing}
.tkcard.repeat-card{border-left:3px solid var(--bl)}
.tktitle{font-size:12px;font-weight:500;margin-bottom:5px;line-height:1.4}
.tkmeta{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tktag{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.ta{background:var(--rbg);color:var(--re)}.tm{background:var(--abg);color:var(--am)}.tb{background:var(--gbg);color:var(--gr)}
.tk-dlg{background:var(--pubg);color:var(--pu);padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.tk-date{font-size:10px;color:var(--t2);background:var(--bg2);padding:2px 7px;border-radius:20px}
.tk-rep{font-size:10px;color:var(--bl);background:var(--bbg);padding:2px 7px;border-radius:20px}
.tkact{display:flex;gap:4px;flex-wrap:wrap}
.tkbtn{padding:3px 9px;border-radius:20px;border:1px solid var(--b1);background:var(--bg);color:var(--t2);cursor:pointer;font-size:10px;font-family:var(--sans);transition:all .1s}
.tkbtn:hover{color:var(--t1);border-color:var(--b2)}
.tkbtn.del{color:var(--re)}.tkbtn.del:hover{background:var(--rbg);border-color:transparent}
.tkbtn.dlg{color:var(--pu)}.tkbtn.dlg:hover{background:var(--pubg);border-color:transparent}
.dzone{min-height:32px;border-radius:var(--r);border:2px dashed transparent;transition:all .15s}
.dzone.over{border-color:var(--bl);background:var(--bbg)}
.addtk{display:flex;align-items:center;gap:6px;padding:7px 12px;margin:4px 8px 8px;border-radius:var(--r);border:1px dashed var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.addtk:hover{border-color:var(--bl);color:var(--bl)}
.tk-panel{display:none;position:fixed;top:52px;right:0;bottom:0;width:270px;background:var(--bg1);border-left:1px solid var(--b1);padding:16px;z-index:50;overflow-y:auto;box-shadow:-4px 0 16px rgba(0,0,0,.07)}
.tk-panel.on{display:block}
.tp-lbl{font-size:10px;color:var(--t2);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;margin-top:12px}
.tp-val{font-size:13px;line-height:1.5}

/* ── FINANCEIRO ── */
.finwrap{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px}
.finnav{display:flex;align-items:center;gap:10px}
.finlbl{font-size:15px;font-weight:500;min-width:140px}
.finnav button{padding:4px 10px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;font-family:var(--sans);transition:all .15s}
.finnav button:hover{background:var(--bg2);color:var(--t1)}
.fin-tabs{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:3px;align-self:flex-start}
.fin-tab{padding:5px 14px;border-radius:6px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:12px;font-family:var(--sans);transition:all .15s}
.fin-tab.on{background:var(--bg1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.fin-cards-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.finsec{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.ftable{width:100%;border-collapse:collapse}
.ftable th{font-size:10px;font-weight:500;color:var(--t2);text-align:left;padding:8px 14px;border-bottom:1px solid var(--b1);background:var(--bg);text-transform:uppercase;letter-spacing:.05em}
.ftable td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--b1)}
.ftable tr:last-child td{border-bottom:none}.ftable tr:hover td{background:var(--bg2)}
.fin-cat-badge{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
</style>
</head>
<body>

<aside class="sb" id="sb">
  <div class="sb-top">
    <span class="sb-brand">Lucas OS</span>
    <button class="sb-tog" onclick="toggleSB()">&#9776;</button>
  </div>
  <nav class="sb-nav">
    <button class="sbi on" onclick="sw('dash',this)"><span class="sbi-ic">⊞</span><span class="sbi-lb">Dashboard</span></button>
    <button class="sbi" onclick="sw('agenda',this)"><span class="sbi-ic">◷</span><span class="sbi-lb">Agenda</span></button>
    <button class="sbi" onclick="sw('tarefas',this)"><span class="sbi-ic">✓</span><span class="sbi-lb">Tarefas</span></button>
    <button class="sbi" onclick="sw('fin',this)"><span class="sbi-ic">◈</span><span class="sbi-lb">Financeiro</span></button>
  </nav>
  <div class="sb-foot">
    <button class="sbi" onclick="toggleSaldo()" id="saldo-btn"><span class="sbi-ic" id="saldo-ic">👁</span><span class="sbi-lb" id="saldo-lb">Ocultar saldo</span></button>
    <button class="sbi" onclick="exportPDF()"><span class="sbi-ic">⬇</span><span class="sbi-lb">Relatório PDF</span></button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-t" id="topbar-t">Dashboard</span>
    <span id="topbar-date" style="font-size:11px;color:var(--t3);font-family:var(--mono)"></span>
  </div>

  <div class="view on" id="view-dash"><div class="dash" id="dash-body"></div></div>

  <div class="view" id="view-agenda">
    <div class="agh">
      <div class="agnav"><button onclick="agNav(-1)">&#8249;</button><button onclick="agNav(1)">&#8250;</button></div>
      <span class="aglbl" id="aglbl"></span>
      <button class="btn" onclick="agToday()" style="margin-right:10px">Hoje</button>
      <div class="vtog">
        <button class="vt on" id="vts" onclick="setAV('s')">Semana</button>
        <button class="vt" id="vtm" onclick="setAV('m')">Mês</button>
      </div>
    </div>
    <div id="agbody" style="display:flex;flex:1;overflow:hidden"></div>
  </div>

  <div class="view" id="view-tarefas">
    <div class="tk-header" id="tk-header"></div>
    <div style="display:flex;flex:1;overflow:hidden">
      <div class="tklayout" id="tklayout"></div>
      <div class="tk-panel" id="tk-panel"></div>
    </div>
  </div>

  <div class="view" id="view-fin"><div class="finwrap" id="finwrap"></div></div>
</div>

<!-- MODAIS -->
<div class="mo" id="mo-ev" onclick="if(event.target===this)cmo('mo-ev')"><div class="mbox">
  <h3 id="mo-ev-t">Novo evento</h3>
  <div class="fl"><label>Título</label><input class="fi" id="ev-t" placeholder="Reunião, ligação..."></div>
  <div class="frow">
    <div class="fl"><label>Data</label><input type="date" class="fi" id="ev-d"></div>
    <div class="fl"><label>Horário</label><input type="time" class="fi" id="ev-h" step="1800"></div>
  </div>
  <div class="frow">
    <div class="fl"><label>Duração</label><select class="fi" id="ev-dur"><option value="0.5">30 min</option><option value="1" selected>1 hora</option><option value="1.5">1h30</option><option value="2">2 horas</option><option value="3">3 horas</option><option value="4">4 horas</option><option value="8">Dia todo</option></select></div>
    <div class="fl"><label>Cor</label><select class="fi" id="ev-cor"><option value="bl">Azul</option><option value="gr">Verde</option><option value="am">Amarelo</option><option value="re">Vermelho</option><option value="pu">Roxo</option></select></div>
  </div>
  <div class="fl"><label>Notas</label><input class="fi" id="ev-nota" placeholder="Observações..."></div>
  <div class="ma"><button class="btn btnd" id="ev-del-btn" style="margin-right:auto;display:none" onclick="delEvEdit()">Excluir</button><button class="btn" onclick="cmo('mo-ev')">Cancelar</button><button class="btn btnp" onclick="saveEv()">Salvar</button></div>
</div></div>

<div class="mo" id="mo-tk" onclick="if(event.target===this)cmo('mo-tk')"><div class="mbox">
  <h3 id="mo-tk-t">Nova tarefa</h3>
  <div class="fl"><label>Título</label><input class="fi" id="tk-titulo" placeholder="O que precisa fazer?"></div>
  <div class="fl"><label>Descrição</label><textarea class="fi" id="tk-desc" rows="2" placeholder="Detalhe..."></textarea></div>
  <div class="frow">
    <div class="fl"><label>Prioridade</label><select class="fi" id="tk-prio"><option value="alta">Alta</option><option value="media" selected>Média</option><option value="baixa">Baixa</option></select></div>
    <div class="fl"><label>Categoria</label><select class="fi" id="tk-cat"><option value="trabalho">Trabalho</option><option value="casa">Casa</option><option value="pessoal">Pessoal</option><option value="faculdade">Faculdade</option><option value="outro">Outro</option></select></div>
  </div>
  <div class="frow">
    <div class="fl"><label>Data</label><input type="date" class="fi" id="tk-data"></div>
    <div class="fl"><label>Horário</label><input type="time" class="fi" id="tk-hora"></div>
  </div>
  <div class="frow">
    <div class="fl"><label>Delegado para</label><input class="fi" id="tk-delegado" placeholder="Nome da pessoa..."></div>
    <div class="fl"><label>Repetir</label><select class="fi" id="tk-rep"><option value="">Não repetir</option><option value="diaria">Diariamente</option><option value="semanal">Semanalmente</option></select></div>
  </div>
  <div class="ma"><button class="btn btnd" id="tk-del" style="margin-right:auto;display:none" onclick="delTask()">Excluir</button><button class="btn" onclick="cmo('mo-tk')">Cancelar</button><button class="btn btnp" onclick="saveTask()">Salvar</button></div>
</div></div>

<div class="mo" id="mo-fin" onclick="if(event.target===this)cmo('mo-fin')"><div class="mbox">
  <h3 id="mo-fin-t">Nova conta</h3>
  <div class="fl"><label>Descrição</label><input class="fi" id="fin-desc" placeholder="Nome ou fornecedor..."></div>
  <div class="frow">
    <div class="fl"><label>Valor R$</label><input type="number" class="fi" id="fin-val" step="0.01"></div>
    <div class="fl"><label>Vencimento</label><input type="date" class="fi" id="fin-venc"></div>
  </div>
  <div class="frow">
    <div class="fl"><label>Categoria</label><select class="fi" id="fin-cat"><option value="fornecedor">Fornecedor</option><option value="marketplace">Marketplace</option><option value="importacao">Importação</option><option value="pessoal">Pessoal</option><option value="escritorio">Escritório</option><option value="faculdade">Faculdade</option><option value="outro">Outro</option></select></div>
    <div class="fl"><label>Status</label><select class="fi" id="fin-st"><option value="pendente">Pendente</option><option value="pago">Pago/Recebido</option><option value="vencido">Vencido</option></select></div>
  </div>
  <div class="fl"><label>NF / Referência</label><input class="fi" id="fin-nf" placeholder="Número NF, link ou referência..."></div>
  <div class="ma"><button class="btn btnd" id="fin-del-btn" style="margin-right:auto;display:none" onclick="delFinEdit()">Excluir</button><button class="btn" onclick="cmo('mo-fin')">Cancelar</button><button class="btn btnp" onclick="saveFinEntry()">Salvar</button></div>
</div></div>

<script type="module">
// ── FIREBASE SETUP ──
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCXAe4DnqU4dUk93L6CpDTxpXWJ8H3Tv5I",
  authDomain: "lucas-os.firebaseapp.com",
  projectId: "lucas-os",
  storageBucket: "lucas-os.firebasestorage.app",
  messagingSenderId: "130357280353",
  appId: "1:130357280353:web:f4e4fe3a41e1d81bf93420",
  measurementId: "G-DYCJ220ZV0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const DOCID = 'main';
const REF = doc(db, 'lucas-os', DOCID);

// ── STATE ──
let tasks=[], events=[], pags=[], recs=[], hideSaldo=false;
let streakData={days:[],last:""};
let _loaded = false;

async function loadFromFirestore() {
  try {
    const snap = await getDoc(REF);
    if (snap.exists()) {
      const d = snap.data();
      tasks = d.tasks || [];
      events = d.events || [];
      pags = d.pags || [];
      recs = d.recs || [];
      streakData = d.streakData || {days:[],last:""};
      hideSaldo = d.hideSaldo || false;
    } else {
      // Migrar do localStorage se existir
      tasks = JSON.parse(localStorage.getItem('lo5_tasks')||'[]');
      events = JSON.parse(localStorage.getItem('lo5_events')||'[]');
      pags = JSON.parse(localStorage.getItem('lo5_pag')||'[]');
      recs = JSON.parse(localStorage.getItem('lo5_rec')||'[]');
      streakData = JSON.parse(localStorage.getItem('lo5_streak')||'{"days":[],"last":""}');
      hideSaldo = localStorage.getItem('lo5_hs')==='1';
      await save();
    }
  } catch(e) {
    console.warn('Firestore erro, usando localStorage:', e);
    tasks = JSON.parse(localStorage.getItem('lo5_tasks')||'[]');
    events = JSON.parse(localStorage.getItem('lo5_events')||'[]');
    pags = JSON.parse(localStorage.getItem('lo5_pag')||'[]');
    recs = JSON.parse(localStorage.getItem('lo5_rec')||'[]');
    streakData = JSON.parse(localStorage.getItem('lo5_streak')||'{"days":[],"last":""}');
    hideSaldo = localStorage.getItem('lo5_hs')==='1';
  }
  _loaded = true;
  if(hideSaldo){document.getElementById('saldo-lb').textContent='Mostrar saldo';document.getElementById('saldo-ic').textContent='🙈';}
  renderDash();
}

async function save(){
  // Salva no localStorage como backup
  localStorage.setItem('lo5_tasks',JSON.stringify(tasks));
  localStorage.setItem('lo5_events',JSON.stringify(events));
  localStorage.setItem('lo5_pag',JSON.stringify(pags));
  localStorage.setItem('lo5_rec',JSON.stringify(recs));
  localStorage.setItem('lo5_streak',JSON.stringify(streakData));
  localStorage.setItem('lo5_hs', hideSaldo?'1':'0');
  // Salva no Firestore
  try {
    await setDoc(REF, {tasks, events, pags, recs, streakData, hideSaldo, updatedAt: new Date().toISOString()});
  } catch(e) {
    console.warn('Erro ao salvar no Firestore:', e);
  }
}
// ── CONSTANTS ──
const MF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const DP=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const SLOT_H=38;
const TITLES={dash:'Dashboard',agenda:'Agenda',tarefas:'Tarefas',fin:'Financeiro'};
const COR={bl:{bg:'rgba(37,99,235,.1)',bd:'#2563eb',tx:'#1d4ed8'},gr:{bg:'rgba(26,158,98,.1)',bd:'#1a9e62',tx:'#15794b'},am:{bg:'rgba(184,115,0,.1)',bd:'#b87300',tx:'#9a6100'},re:{bg:'rgba(208,48,48,.1)',bd:'#d03030',tx:'#b52828'},pu:{bg:'rgba(109,79,194,.1)',bd:'#6d4fc2',tx:'#5a3ea8'}};
const CAT_COLORS={fornecedor:'var(--gr)',marketplace:'var(--pu)',importacao:'var(--or)',pessoal:'var(--bl)',escritorio:'var(--am)',faculdade:'var(--re)',outro:'var(--t2)'};
const CAT_BG={fornecedor:'var(--gbg)',marketplace:'var(--pubg)',importacao:'var(--orbg)',pessoal:'var(--bbg)',escritorio:'var(--abg)',faculdade:'var(--rbg)',outro:'var(--bg3)'};
const TK_CAT_CLASS={trabalho:'tag-trab',casa:'tag-casa',pessoal:'tag-pess',faculdade:'tag-facu',outro:'tag-outro'};

// ── HELPERS ──
function R(v){if(hideSaldo)return'R$ ••••';return'R$\u00a0'+(Number(v)||0).toFixed(2).replace('.',',')}
function Rraw(v){return'R$\u00a0'+(Number(v)||0).toFixed(2).replace('.',',')}
function fd(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}`}
function toDS(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function nowDS(){return toDS(new Date())}
function nowHM(){const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`}
function timeToMin(t){const[h,m]=(t||'0:0').split(':').map(Number);return h*60+m}
function cmo(id){document.getElementById(id).classList.remove('on')}
function omo(id){document.getElementById(id).classList.add('on')}
function sw(v,btn){
  document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));
  document.querySelectorAll('.sbi').forEach(e=>e.classList.remove('on'));
  document.getElementById('view-'+v).classList.add('on');
  if(btn)btn.classList.add('on');
  else document.querySelector(`.sbi[onclick*="'${v}'"]`)?.classList.add('on');
  document.getElementById('topbar-t').textContent=TITLES[v];
  if(v==='agenda')renderAg();if(v==='fin')renderFin();if(v==='tarefas')renderTasks();if(v==='dash')renderDash();
}

// topbar date
function updateTopbarDate(){
  const d=new Date();
  document.getElementById('topbar-date').textContent=`${DP[d.getDay()]}, ${d.getDate()} ${MS[d.getMonth()]} ${d.getFullYear()}`;
}
updateTopbarDate();

// sidebar
let sbOpen=true;
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('col',!sbOpen)}

// ocultar saldo
function toggleSaldo(){
  hideSaldo=!hideSaldo;localStorage.setItem('lo5_hs',hideSaldo?'1':'0');
  document.getElementById('saldo-lb').textContent=hideSaldo?'Mostrar saldo':'Ocultar saldo';
  document.getElementById('saldo-ic').textContent=hideSaldo?'🙈':'👁';
  const av=document.querySelector('.view.on')?.id?.replace('view-','');
  if(av==='dash')renderDash();if(av==='fin')renderFin();
}


// ── STREAK ──
function updateStreak(){
  const tod=nowDS();
  if(streakData.last===tod)return;
  const done=tasks.filter(t=>t.status==='concluido'&&t.completedAt===tod).length;
  if(done>0){
    const yest=new Date();yest.setDate(yest.getDate()-1);
    const yestDS=toDS(yest);
    if(streakData.last===yestDS){streakData.days.push(tod)}
    else{streakData.days=[tod]}
    streakData.last=tod;
    save();
  }
}
function getStreak(){updateStreak();return streakData.days.length}

// ── DASHBOARD ──
let dM=new Date().getMonth(),dY=new Date().getFullYear();
function renderDash(){
  const tod=nowDS();const nowHour=nowHM();
  const mk=`${dY}-${String(dM+1).padStart(2,'0')}`;
  const mp=pags.filter(e=>e.venc&&e.venc.startsWith(mk));
  const mr=recs.filter(e=>e.venc&&e.venc.startsWith(mk));
  const tPagar=mp.reduce((s,e)=>s+e.val,0);
  const tReceber=mr.reduce((s,e)=>s+e.val,0);
  const tPago=mp.filter(e=>e.status==='pago').reduce((s,e)=>s+e.val,0);
  const tRecebido=mr.filter(e=>e.status==='pago').reduce((s,e)=>s+e.val,0);
  const saldo=tRecebido-tPago;
  const mxB=Math.max(tReceber,tPagar,0.01);
  // tarefas
  const tot=tasks.length,pend=tasks.filter(t=>t.status==='pendente').length;
  const and=tasks.filter(t=>t.status==='andamento').length,conc=tasks.filter(t=>t.status==='concluido').length;
  const canc=tasks.filter(t=>t.status==='cancelado').length;
  const pct=tot>0?Math.round(conc/tot*100):0;
  // proximas tarefas (nao concluidas com data)
  const proxTk=tasks.filter(t=>t.status!=='concluido'&&t.status!=='cancelado'&&t.data>=tod).sort((a,b)=>a.data.localeCompare(b.data)).slice(0,5);
  // agenda de hoje
  const todayEvs=events.filter(e=>e.data===tod).sort((a,b)=>a.hora.localeCompare(b.hora));
  // alertas
  const atrasadas=tasks.filter(t=>t.data&&t.data<tod&&t.status!=='concluido'&&t.status!=='cancelado');
  const vencidas=pags.filter(e=>e.status==='vencido'||( e.status==='pendente'&&e.venc&&e.venc<tod));
  // categorias de gastos
  const catMap={};pags.filter(e=>e.venc&&e.venc.startsWith(mk)).forEach(e=>{const c=e.cat||'outro';catMap[c]=(catMap[c]||0)+e.val});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxCat=catArr.length?catArr[0][1]:1;
  const streak=getStreak();

  document.getElementById('dash-body').innerHTML=`
    <div class="dnav">
      <button class="btn" onclick="dN(-1)">&#8249;</button>
      <span class="dlbl">${MF[dM]} ${dY}</span>
      <button class="btn" onclick="dN(1)">&#8250;</button>
      <button class="btn" onclick="dT()">Mês atual</button>
    </div>

    <!-- métricas financeiras -->
    <div class="fin-cards-row">
      <div class="mc"><div class="mc-lbl">A Receber</div><div class="mc-val b">${R(tReceber)}</div><div class="mc-sub">${mr.length} lançamentos</div></div>
      <div class="mc"><div class="mc-lbl">Recebido</div><div class="mc-val g">${R(tRecebido)}</div><div class="mc-sub">${mr.filter(e=>e.status==='pago').length} pagos</div></div>
      <div class="mc"><div class="mc-lbl">A Pagar</div><div class="mc-val r">${R(tPagar)}</div><div class="mc-sub">${mp.length} lançamentos</div></div>
      <div class="mc"><div class="mc-lbl">Pago</div><div class="mc-val a">${R(tPago)}</div><div class="mc-sub">${mp.filter(e=>e.status==='pago').length} pagos</div></div>
      <div class="mc"><div class="mc-lbl">Saldo Líquido</div><div class="mc-val ${saldo>=0?'g':'r'}">${R(saldo)}</div><div class="mc-sub">${saldo>=0?'positivo':'atenção'}</div></div>
    </div>

    <div class="dash-row">
      <!-- agenda hoje -->
      <div class="dcard">
        <div class="sh"><span class="st">Agenda de hoje — ${todayEvs.length} compromisso${todayEvs.length!==1?'s':''}</span><button class="btn" style="font-size:10px" onclick="sw('agenda',null)">ver agenda</button></div>
        ${todayEvs.length===0?'<div class="empty">Nenhum compromisso hoje</div>':todayEvs.map(ev=>{
          const missed=ev.hora<nowHour&&!ev.confirmed;
          const confirmed=ev.confirmed;
          const cls=missed?'missed':'';
          const dot=missed?'missed-dot':confirmed?'ok-dot':'future-dot';
          return`<div class="ag-hoje-item ${cls}">
            <div class="${dot}"></div>
            <span class="ag-hoje-time">${ev.hora}</span>
            <span class="ag-hoje-title">${ev.titulo}</span>
            <span class="ag-hoje-dur">${ev.dur}h</span>
            <button class="ag-hoje-conf ${confirmed?'done':''}" onclick="confirmEv('${ev.id}')">${confirmed?'✓ confirmado':'confirmar'}</button>
          </div>`;
        }).join('')}
      </div>

      <!-- tarefas proximas -->
      <div class="dcard">
        <div class="sh"><span class="st">Próximas tarefas</span><button class="btn" style="font-size:10px" onclick="sw('tarefas',null)">ver todas</button></div>
        ${proxTk.length===0?'<div class="empty">Nenhuma tarefa com data futura</div>':proxTk.map(t=>{
          const tc={alta:'ta',media:'tm',baixa:'tb'}[t.prioridade]||'tm';
          const catCls=TK_CAT_CLASS[t.cat||'outro']||'tag-outro';
          const atrasada=t.data<tod;
          return`<div class="tk-prox-item">
            <span class="tktag ${tc}">${t.prioridade}</span>
            <span class="tk-prox-title" style="${atrasada?'color:var(--re)':''}">${t.titulo}</span>
            <span class="tk-prox-date">${fd(t.data)}</span>
            <span class="tag ${catCls}" style="font-size:9px">${t.cat||'outro'}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <div class="dash-row">
      <!-- progresso tarefas -->
      <div class="prog-card">
        <div class="prog-head"><span class="prog-title">Progresso das tarefas</span><span class="prog-pct">${pct}% concluído</span></div>
        <div class="prog-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
        <div class="prog-cols">
          <div class="pc"><div class="pc-n" style="color:var(--am)">${pend}</div><div class="pc-l">A fazer</div></div>
          <div class="pc"><div class="pc-n" style="color:var(--bl)">${and}</div><div class="pc-l">Andamento</div></div>
          <div class="pc"><div class="pc-n" style="color:var(--gr)">${conc}</div><div class="pc-l">Concluído</div></div>
          <div class="pc"><div class="pc-n" style="color:var(--t3)">${canc}</div><div class="pc-l">Cancelado</div></div>
        </div>
      </div>

      <!-- streak -->
      <div class="streak-card">
        <div>
          <div class="streak-num">${streak}</div>
          <div class="streak-lbl">dias seguidos</div>
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500;margin-bottom:4px">Sequência de produtividade 🔥</div>
          <div style="font-size:11px;opacity:.65">Conclua ao menos 1 tarefa por dia para manter a sequência.</div>
        </div>
      </div>
    </div>

    <div class="dash-row">
      <!-- fluxo financeiro -->
      <div class="dcard">
        <div class="sh"><span class="st">Fluxo ${MS[dM]} ${dY}</span></div>
        <div class="fw">
          <div class="fr2"><span class="flbl2">A receber</span><div class="fbg"><div class="fbar" style="width:${Math.round(tReceber/mxB*100)}%;background:var(--bl)"></div></div><span class="fv" style="color:var(--bl)">${R(tReceber)}</span></div>

        el.onclick=(e)=>{if(!e.target.classList.contains('dx'))openEvEdit(ev.id)};
        el.draggable=true;el.ondragstart=(e)=>{e.dataTransfer.setData('evId',ev.id);e.stopPropagation()};

      cb.ondrop=e=>{e.preventDefault();const evId=e.dataTransfer.getData('evId');if(!evId)return;const rect=cb.getBoundingClientRect();const ry=e.clientY-rect.top;const idx=Math.max(0,Math.floor(ry/SLOT_H));const hh=7+Math.floor(idx/2);const mm=idx%2===0?'00':'30';const ev=events.find(x=>x.id===evId);if(ev){ev.data=ds;ev.hora=`${String(hh).padStart(2,'0')}:${mm}`;save();renderAg()}};

      grid.appendChild(c);

    wrap.appendChild(grid);body.appendChild(wrap);
  }
}

  renderTaskHeader();

    let ct=tasks.filter(t=>t.status===col.id);

function processRepeatTasks(){
  const tod=nowDS();
  tasks.filter(t=>t.rep&&t.status==='concluido'&&t.completedAt&&t.completedAt<tod).forEach(t=>{
    // cria nova instância para hoje
    const exists=tasks.find(x=>x.repParent===t.id&&x.data===tod);
    if(!exists){
      tasks.push({...t,id:Date.now().toString()+Math.random(),status:'pendente',completedAt:null,repParent:t.id,data:tod});
      t.status='arquivado';
    }
  });
}

let fM=new Date().getMonth(),fY=new Date().getFullYear(),finTipo='pag',finTab='pagar',editFinId=null;
function renderFin(){
  const mk=`${fY}-${String(fM+1).padStart(2,'0')}`;

  const ar=recs.filter(e=>!e.venc||e.venc.startsWith(mk));

  const tRecebido=ar.filter(e=>e.status==='pago').reduce((s,e)=>s+e.val,0);
  const saldo=tRecebido-tPago;
  // categorias
  const catMap={};ap.forEach(e=>{const c=e.cat||'outro';catMap[c]=(catMap[c]||0)+e.val});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxCat=catArr.length?catArr[0][1]:1;

  const w=document.getElementById('finwrap');
  w.innerHTML=`
    <div class="finnav">
      <button onclick="fN(-1)">&#8249;</button>
      <span class="finlbl">${MF[fM]} ${fY}</span>
      <button onclick="fN(1)">&#8250;</button>
      <button class="btn" onclick="fT()">Mês atual</button>
      <span style="flex:1"></span>
      <button class="btn btnp" onclick="oFinMo('pag')">+ Pagamento</button>
      <button class="btn" onclick="oFinMo('rec')">+ Recebimento</button>
    </div>

    <!-- 5 cards separados -->
    <div class="fin-cards-row">
      <div class="mc"><div class="mc-lbl">A Receber</div><div class="mc-val b">${R(tReceber)}</div><div class="mc-sub">${ar.filter(e=>e.status!=='pago').length} pendentes</div></div>
      <div class="mc"><div class="mc-lbl">Recebido</div><div class="mc-val g">${R(tRecebido)}</div><div class="mc-sub">${ar.filter(e=>e.status==='pago').length} confirmados</div></div>
      <div class="mc"><div class="mc-lbl">A Pagar</div><div class="mc-val a">${R(tPagar)}</div><div class="mc-sub">${ap.filter(e=>e.status!=='pago').length} pendentes</div></div>
      <div class="mc"><div class="mc-lbl">Pago</div><div class="mc-val r">${R(tPago)}</div><div class="mc-sub">${ap.filter(e=>e.status==='pago').length} confirmados</div></div>
      <div class="mc"><div class="mc-lbl">Saldo Líquido</div><div class="mc-val ${saldo>=0?'g':'r'}">${R(saldo)}</div></div>
    </div>

    <!-- tabs -->
    <div style="display:flex;align-items:center;gap:10px">
      <div class="fin-tabs">
        <button class="fin-tab${finTab==='pagar'?' on':''}" onclick="setFinTab('pagar')">A Pagar</button>
        <button class="fin-tab${finTab==='receber'?' on':''}" onclick="setFinTab('receber')">A Receber</button>
        <button class="fin-tab${finTab==='fluxo'?' on':''}" onclick="setFinTab('fluxo')">Fluxo</button>
        <button class="fin-tab${finTab==='cats'?' on':''}" onclick="setFinTab('cats')">Categorias</button>
      </div>
    </div>

    <div id="fin-tab-content"></div>`;

  renderFinTab(ap,ar,tPagar,tReceber,tPago,tRecebido,saldo,catArr,maxCat);
}
function setFinTab(t){finTab=t;renderFin()}
function renderFinTab(ap,ar,tP,tR,tPago,tRec,saldo,catArr,maxCat){
  const el=document.getElementById('fin-tab-content');
  if(finTab==='pagar'){
    el.innerHTML=`<div class="finsec"><div class="sh"><span class="st">Contas a pagar — ${ap.length} lançamentos</span></div>
      ${ap.length===0?'<div class="empty">Nenhum lançamento</div>':`<table class="ftable"><thead><tr><th>Descrição</th><th>Valor</th><th>Venc.</th><th>Categoria</th><th>NF/Ref</th><th>Status</th><th></th></tr></thead><tbody>${ap.map(e=>`<tr><td style="font-weight:500">${e.desc}</td><td style="color:var(--re);font-family:var(--mono)">${R(e.val)}</td><td style="font-family:var(--mono);color:var(--t2)">${fd(e.venc)}</td><td><span class="fin-cat-badge" style="background:${CAT_BG[e.cat||'outro']};color:${CAT_COLORS[e.cat||'outro']}">${e.cat||'outro'}</span></td><td style="font-size:10px;color:var(--t2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.nf||'—'}</td><td><span class="pill p-${e.status}" onclick="tgSt('pag','${e.id}')">${e.status}</span></td><td style="display:flex;gap:4px"><button class="btn" style="padding:2px 7px;font-size:10px" onclick="editFinEntry('pag','${e.id}')">✎</button><button class="btn btnd" style="padding:2px 7px;font-size:10px" onclick="dFin('pag','${e.id}')">✕</button></td></tr>`).join('')}</tbody></table>`}
    </div>`;
  } else if(finTab==='receber'){
    el.innerHTML=`<div class="finsec"><div class="sh"><span class="st">Contas a receber — ${ar.length} lançamentos</span></div>
      ${ar.length===0?'<div class="empty">Nenhum lançamento</div>':`<table class="ftable"><thead><tr><th>Descrição</th><th>Valor</th><th>Venc.</th><th>Categoria</th><th>NF/Ref</th><th>Status</th><th></th></tr></thead><tbody>${ar.map(e=>`<tr><td style="font-weight:500">${e.desc}</td><td style="color:var(--gr);font-family:var(--mono)">${R(e.val)}</td><td style="font-family:var(--mono);color:var(--t2)">${fd(e.venc)}</td><td><span class="fin-cat-badge" style="background:${CAT_BG[e.cat||'outro']};color:${CAT_COLORS[e.cat||'outro']}">${e.cat||'outro'}</span></td><td style="font-size:10px;color:var(--t2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.nf||'—'}</td><td><span class="pill p-${e.status}" onclick="tgSt('rec','${e.id}')">${e.status}</span></td><td style="display:flex;gap:4px"><button class="btn" style="padding:2px 7px;font-size:10px" onclick="editFinEntry('rec','${e.id}')">✎</button><button class="btn btnd" style="padding:2px 7px;font-size:10px" onclick="dFin('rec','${e.id}')">✕</button></td></tr>`).join('')}</tbody></table>`}
    </div>`;
  } else if(finTab==='fluxo'){
    const mxB=Math.max(tR,tP,0.01);
    el.innerHTML=`<div class="finsec"><div class="sh"><span class="st">Fluxo mensal</span></div>
      <div class="fw">
        <div class="fr2"><span class="flbl2">A receber</span><div class="fbg"><div class="fbar" style="width:${Math.round(tR/mxB*100)}%;background:var(--bl)"></div></div><span class="fv" style="color:var(--bl)">${R(tR)}</span></div>
        <div class="fr2"><span class="flbl2">Recebido</span><div class="fbg"><div class="fbar" style="width:${Math.round(tRec/mxB*100)}%;background:var(--gr)"></div></div><span class="fv" style="color:var(--gr)">${R(tRec)}</span></div>
        <div class="fr2"><span class="flbl2">A pagar</span><div class="fbg"><div class="fbar" style="width:${Math.round(tP/mxB*100)}%;background:var(--am)"></div></div><span class="fv" style="color:var(--am)">${R(tP)}</span></div>
        <div class="fr2"><span class="flbl2">Pago</span><div class="fbg"><div class="fbar" style="width:${Math.round(tPago/mxB*100)}%;background:var(--re)"></div></div><span class="fv" style="color:var(--re)">${R(tPago)}</span></div>
        <div class="fr2"><span class="flbl2">Saldo</span><div class="fbg"><div class="fbar" style="width:${Math.round(Math.abs(saldo)/mxB*100)}%;background:var(--pu)"></div></div><span class="fv" style="color:var(--${saldo>=0?'gr':'re'})">${R(saldo)}</span></div>
      </div>
    </div>`;
  } else if(finTab==='cats'){
    el.innerHTML=`<div class="finsec"><div class="sh"><span class="st">Gastos por categoria</span></div>
      ${catArr.length===0?'<div class="empty">Nenhum gasto lançado</div>':`<div class="cat-chart" style="padding:14px 16px;gap:10px">${catArr.map(([cat,val])=>`
        <div class="cat-bar-row">
          <span class="cat-bar-lbl" style="width:100px">${cat}</span>
          <div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${Math.round(val/maxCat*100)}%;background:${CAT_COLORS[cat]||'var(--t2)'}"></div></div>
          <span class="cat-bar-val">${R(val)}</span>
        </div>`).join('')}</div>`}
    </div>`;
  }
}
function fN(d){fM+=d;if(fM>11){fM=0;fY++}if(fM<0){fM=11;fY--}renderFin()}
function fT(){fM=new Date().getMonth();fY=new Date().getFullYear();renderFin()}
function oFinMo(tipo){finTipo=tipo;editFinId=null;document.getElementById('mo-fin-t').textContent=tipo==='pag'?'Nova conta a pagar':'Novo recebimento';document.getElementById('fin-desc').value='';document.getElementById('fin-val').value='';document.getElementById('fin-venc').value='';document.getElementById('fin-cat').value='fornecedor';document.getElementById('fin-st').value='pendente';document.getElementById('fin-nf').value='';document.getElementById('fin-del-btn').style.display='none';omo('mo-fin')}
function editFinEntry(tipo,id){
  finTipo=tipo;editFinId=id;
  const arr=tipo==='pag'?pags:recs;const e=arr.find(x=>x.id===id);if(!e)return;
  document.getElementById('mo-fin-t').textContent=tipo==='pag'?'Editar pagamento':'Editar recebimento';
  document.getElementById('fin-desc').value=e.desc;document.getElementById('fin-val').value=e.val;
  document.getElementById('fin-venc').value=e.venc||'';document.getElementById('fin-cat').value=e.cat||'outro';
  document.getElementById('fin-st').value=e.status;document.getElementById('fin-nf').value=e.nf||'';
  document.getElementById('fin-del-btn').style.display='block';omo('mo-fin');
}
function delFinEdit(){
  if(finTipo==='pag')pags=pags.filter(x=>x.id!==editFinId);else recs=recs.filter(x=>x.id!==editFinId);
  save();cmo('mo-fin');renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash();
}
function saveFinEntry(){
  const d=document.getElementById('fin-desc').value.trim();const v=parseFloat(document.getElementById('fin-val').value);if(!d||!v)return;
  if(editFinId){
    const arr=finTipo==='pag'?pags:recs;const e=arr.find(x=>x.id===editFinId);
    if(e){e.desc=d;e.val=v;e.venc=document.getElementById('fin-venc').value;e.cat=document.getElementById('fin-cat').value;e.status=document.getElementById('fin-st').value;e.nf=document.getElementById('fin-nf').value}
  } else {
    const e={id:Date.now().toString(),desc:d,val:v,venc:document.getElementById('fin-venc').value,cat:document.getElementById('fin-cat').value,status:document.getElementById('fin-st').value,nf:document.getElementById('fin-nf').value};
    if(finTipo==='pag')pags.push(e);else recs.push(e);
  }
  save();cmo('mo-fin');renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash();
}
function tgSt(tipo,id){const arr=tipo==='pag'?pags:recs;const e=arr.find(x=>x.id===id);if(!e)return;const c={pendente:'pago',pago:'vencido',vencido:'pendente'};e.status=c[e.status]||'pendente';save();renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash()}
function dFin(tipo,id){if(tipo==='pag')pags=pags.filter(x=>x.id!==id);else recs=recs.filter(x=>x.id!==id);save();renderFin();if(document.getElementById('view-dash').classList.contains('on'))renderDash()}

// ── PDF EXPORT ──
function exportPDF(){
  try{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    const tod=nowDS();
    const mk=`${dY}-${String(dM+1).padStart(2,'0')}`;
    doc.setFontSize(18);doc.setFont('helvetica','bold');
    doc.text('Lucas OS — Relatório Mensal',14,20);
    doc.setFontSize(11);doc.setFont('helvetica','normal');
    doc.text(`${MF[dM]} ${dY}   |   Gerado em ${fd(tod)}`,14,28);
    doc.setDrawColor(200);doc.line(14,32,196,32);
    let y=40;
    // financeiro
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Financeiro',14,y);y+=8;
    const ap=pags.filter(e=>e.venc&&e.venc.startsWith(mk));
    const ar=recs.filter(e=>e.venc&&e.venc.startsWith(mk));
    const tP=ap.reduce((s,e)=>s+e.val,0),tR=ar.reduce((s,e)=>s+e.val,0);
    const tPg=ap.filter(e=>e.status==='pago').reduce((s,e)=>s+e.val,0);
    const tRc=ar.filter(e=>e.status==='pago').reduce((s,e)=>s+e.val,0);
    doc.setFontSize(10);doc.setFont('helvetica','normal');
    doc.text(`A Receber: ${Rraw(tR)}   Recebido: ${Rraw(tRc)}   A Pagar: ${Rraw(tP)}   Pago: ${Rraw(tPg)}   Saldo: ${Rraw(tRc-tPg)}`,14,y);y+=10;
    // tabela pagamentos
    if(ap.length>0){
      doc.setFont('helvetica','bold');doc.text('Contas a Pagar:',14,y);y+=6;doc.setFont('helvetica','normal');
      ap.forEach(e=>{
        if(y>270){doc.addPage();y=20}
        doc.text(`• ${e.desc} — ${Rraw(e.val)} — ${fd(e.venc)} — ${e.status}${e.nf?' ['+e.nf+']':''}`,16,y);y+=5;
      });y+=4;
    }
    if(ar.length>0){
      doc.setFont('helvetica','bold');doc.text('Contas a Receber:',14,y);y+=6;doc.setFont('helvetica','normal');
      ar.forEach(e=>{
        if(y>270){doc.addPage();y=20}
        doc.text(`• ${e.desc} — ${Rraw(e.val)} — ${fd(e.venc)} — ${e.status}${e.nf?' ['+e.nf+']':''}`,16,y);y+=5;
      });y+=4;
    }
    // tarefas
    if(y>240){doc.addPage();y=20}
    doc.setFontSize(13);doc.setFont('helvetica','bold');doc.text('Tarefas',14,y);y+=8;
    const tkSummary=[{s:'pendente',l:'A fazer'},{s:'andamento',l:'Em andamento'},{s:'concluido',l:'Concluído'}];
    tkSummary.forEach(({s,l})=>{
      const ct=tasks.filter(t=>t.status===s);
      if(ct.length===0)return;
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.text(`${l} (${ct.length}):`,14,y);y+=5;doc.setFont('helvetica','normal');
      ct.slice(0,10).forEach(t=>{
        if(y>270){doc.addPage();y=20}
        doc.text(`• ${t.titulo} [${t.prioridade}]${t.delegado?' → '+t.delegado:''}${t.data?' — '+fd(t.data):''}`,16,y);y+=5;
      });y+=3;
    });
    doc.save(`lucas-os-${mk}.pdf`);
  }catch(err){alert('Erro ao gerar PDF. Verifique se a biblioteca carregou.')}
}

// ── INIT ──
loadFromFirestore();

</script>
