<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lucas OS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F0;--bg1:#FFFFFF;--bg2:#F0EFEA;--bg3:#E8E7E1;
  --b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);
  --t1:#1A1A18;--t2:#6B6B66;--t3:#AEAEAD;
  --gr:#1A9E62;--gbg:#E6F7EF;--gtx:#0F6E56;
  --re:#D63B3B;--rbg:#FDEAEA;--rtx:#A32D2D;
  --bl:#2563EB;--bbg:#EFF4FF;--btx:#185FA5;
  --am:#B87300;--abg:#FFF3D0;--atx:#854F0B;
  --pu:#6D4FC2;--pubg:#F0EBFF;--putx:#3C3489;
  --sb:240px;--r:12px;--rl:18px;
  --slot:40px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:15px;height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

/* SIDEBAR */
.sidebar{width:var(--sb);flex-shrink:0;background:var(--bg1);border-right:1px solid var(--b1);display:flex;flex-direction:column;height:100vh;overflow:hidden;transition:width .22s ease}
.sidebar.col{width:60px}
.sb-top{padding:18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);min-height:60px;flex-shrink:0}
.sb-brand{font-size:15px;font-weight:600;color:var(--t1);letter-spacing:-.2px;white-space:nowrap;overflow:hidden;transition:opacity .15s}
.sidebar.col .sb-brand{opacity:0;width:0}
.sb-tog{width:32px;height:32px;border-radius:var(--r);border:1px solid var(--b1);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--t2);font-size:18px;line-height:1}
.sb-tog:hover{background:var(--bg2)}
.sb-nav{padding:10px 8px;flex:1;display:flex;flex-direction:column;gap:3px}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r);cursor:pointer;white-space:nowrap;border:none;background:transparent;width:100%;text-align:left;font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--t2);transition:all .15s}
.sb-item:hover{background:var(--bg2);color:var(--t1)}
.sb-item.on{background:var(--t1);color:#fff}
.sb-icon{width:24px;height:24px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.sb-lbl{overflow:hidden;transition:opacity .15s;white-space:nowrap}
.sidebar.col .sb-lbl{opacity:0;width:0;overflow:hidden}
.sb-foot{padding:10px 8px;border-top:1px solid var(--b1);flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:60px;border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 22px;gap:12px;flex-shrink:0;background:var(--bg1)}
.topbar-t{font-size:17px;font-weight:600;color:var(--t1);flex:1;letter-spacing:-.2px}
.view{display:none;flex:1;overflow:hidden;flex-direction:column}.view.on{display:flex}

/* BOTÕES */
.btn{padding:7px 14px;border-radius:var(--r);border:1px solid var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s}
.btn:hover{background:var(--bg2);color:var(--t1)}.btnp{background:var(--t1);color:#fff;border-color:var(--t1)}.btnp:hover{opacity:.85}
.btng{background:var(--gr);color:#fff;border-color:var(--gr)}.btng:hover{opacity:.85}
.btnd{color:var(--re);border-color:transparent}.btnd:hover{background:var(--rbg)}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer}
.p-pago{background:var(--gbg);color:var(--gtx)}.p-pendente{background:var(--abg);color:var(--atx)}.p-vencido{background:var(--rbg);color:var(--rtx)}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;align-items:flex-end;justify-content:center}
.mo.on{display:flex}
.mbox{background:var(--bg1);border-radius:24px 24px 0 0;padding:24px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(0,0,0,.12)}
.mbox h3{font-size:16px;font-weight:600;margin-bottom:18px;color:var(--t1)}
.fl{margin-bottom:12px}.fl label{font-size:12px;color:var(--t2);margin-bottom:5px;display:block;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.fi{width:100%;padding:10px 13px;border:1px solid var(--b2);border-radius:var(--r);background:var(--bg);color:var(--t1);font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border .15s}
.fi:focus{border-color:var(--bl)}.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* CARDS GENÉRICOS */
.card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);overflow:hidden}
.sh{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.st{font-size:12px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.empty{padding:28px;font-size:14px;color:var(--t3);text-align:center}

/* SCROLL FEED */
.feed{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}

/* DASHBOARD */
.dnav{display:flex;align-items:center;gap:10px}
.dlbl{font-size:17px;font-weight:600;color:var(--t1);min-width:160px;letter-spacing:-.2px}
.mcards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.mc{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:18px 20px}
.mc-lbl{font-size:11px;color:var(--t2);margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.mc-val{font-size:24px;font-weight:600;letter-spacing:-.5px}
.mc-val.g{color:var(--gr)}.mc-val.r{color:var(--re)}.mc-val.b{color:var(--bl)}.mc-val.a{color:var(--am)}
.mc-sub{font-size:12px;color:var(--t3);margin-top:5px}
.prog-card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:20px 22px}
.prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.prog-title{font-size:13px;font-weight:600;color:var(--t1);text-transform:uppercase;letter-spacing:.04em}
.prog-pct{font-size:20px;font-weight:600;color:var(--gr);letter-spacing:-.4px}
.prog-bg{height:10px;background:var(--bg3);border-radius:20px;overflow:hidden;margin-bottom:18px}
.prog-bar{height:100%;border-radius:20px;background:var(--gr);transition:width .6s cubic-bezier(.4,0,.2,1)}
.prog-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.pc{background:var(--bg);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;text-align:center}
.pc-n{font-size:22px;font-weight:600;margin-bottom:4px;letter-spacing:-.4px}
.pc-l{font-size:11px;color:var(--t3);font-weight:500}
.d2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ditem{padding:13px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;font-size:14px}
.ditem:last-child{border-bottom:none}
.ddot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fw{padding:18px 20px;display:flex;flex-direction:column;gap:12px}
.frow2{display:flex;align-items:center;gap:12px}
.flbl2{font-size:12px;color:var(--t2);width:100px;flex-shrink:0;font-weight:500}
.fbg{flex:1;height:8px;background:var(--bg3);border-radius:20px;overflow:hidden}
.fbar{height:100%;border-radius:20px}
.fbg2{background:var(--gr)}.fbr2{background:var(--re)}.fbb2{background:var(--bl)}
.fv{font-size:13px;font-weight:600;min-width:100px;text-align:right}
.tkc-row{display:flex;align-items:center;padding:13px 18px;border-bottom:1px solid var(--b1);gap:12px}
.tkc-row:last-child{border-bottom:none}
.tkc-left{flex:1;min-width:0}
.tkc-title{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tkc-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tkc-tag{padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tag-a{background:var(--rbg);color:var(--rtx)}.tag-m{background:var(--abg);color:var(--atx)}.tag-b{background:var(--gbg);color:var(--gtx)}
.tkc-dlg{background:var(--pubg);color:var(--putx);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tkc-btns{display:flex;gap:6px;flex-shrink:0}
.tkc-btn{padding:6px 13px;border-radius:20px;border:1px solid var(--b1);background:var(--bg);color:var(--t2);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
.tkc-btn:hover{border-color:var(--b2);color:var(--t1)}
.tkc-btn.active{background:var(--bbg);color:var(--btx);border-color:transparent}
.tkc-btn.done{background:var(--gbg);color:var(--gtx);border-color:transparent}

/* AGENDA */
.agh{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--bg1)}
.agnav{display:flex;gap:5px}
.agnav button{width:34px;height:34px;border:1px solid var(--b2);border-radius:var(--r);background:transparent;color:var(--t2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;transition:all .15s}
.agnav button:hover{background:var(--bg2);color:var(--t1)}
.aglbl{font-size:16px;font-weight:600;color:var(--t1);flex:1;letter-spacing:-.2px}
.vtog{display:flex;gap:2px;background:var(--bg2);border-radius:var(--r);padding:4px}
.vt{padding:5px 14px;border-radius:9px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s}
.vt.on{background:var(--bg1);color:var(--t1);box-shadow:0 1px 6px rgba(0,0,0,.1)}
.ag-week{display:flex;flex:1;overflow:hidden}
.ag-tc{width:50px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--b1)}
.ag-tc::-webkit-scrollbar{display:none}
.ag-days{display:flex;flex:1;overflow:hidden}
.agcol{flex:1;overflow-y:auto;border-right:1px solid var(--b1);min-width:0;position:relative}
.agcol:last-child{border-right:none}
.agcol::-webkit-scrollbar{display:none}
.agch{position:sticky;top:0;background:var(--bg1);padding:10px 5px;border-bottom:1px solid var(--b1);font-size:12px;font-weight:600;color:var(--t1);z-index:10;text-align:center}
.agch small{display:block;font-size:11px;font-weight:400;color:var(--t2);margin-top:2px}
.agch.td{color:var(--bl)}
.agcb{position:relative}
.tslot{height:var(--slot);border-bottom:1px solid rgba(0,0,0,.04)}
.tslot.half{border-bottom:1px dashed rgba(0,0,0,.03)}
.ag-tc .tslot{display:flex;align-items:flex-start;padding:2px 7px 0;justify-content:flex-end}
.tlbl{font-size:10px;color:var(--t3);font-weight:500;line-height:1}
.tslot.half .tlbl{opacity:0}
.sarea{position:absolute;left:0;right:0;cursor:pointer}
.sarea:hover{background:rgba(37,99,235,.05)}
.sev{position:absolute;left:4px;right:4px;border-left-width:3px;border-left-style:solid;border-radius:10px;padding:5px 8px;font-size:12px;font-weight:500;overflow:hidden;cursor:pointer;z-index:5}
.sev:hover{filter:brightness(.96)}
.sev .dx{position:absolute;top:5px;right:6px;opacity:0;cursor:pointer;font-size:11px;background:rgba(255,255,255,.95);border-radius:4px;padding:0 4px;line-height:1.6;color:var(--re)}
.sev:hover .dx{opacity:1}
.sev-t{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:18px;margin-bottom:1px}
.sev-s{font-size:10px;opacity:.6;font-weight:400}
.ag-month{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mgh-r{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--b1);flex-shrink:0}
.mgh{padding:8px 5px;font-size:11px;color:var(--t2);text-align:center;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.mgrid{flex:1;display:grid;grid-template-columns:repeat(7,1fr);overflow-y:auto;align-content:start}
.mday{border-right:1px solid var(--b1);border-bottom:1px solid var(--b1);min-height:76px;padding:7px;cursor:pointer;overflow:hidden;transition:background .1s}
.mday:nth-child(7n){border-right:none}.mday:hover{background:var(--bg2)}
.mday.om .dnum{color:var(--t3)}
.dnum{font-size:12px;color:var(--t2);margin-bottom:5px;font-weight:600}
.dnum.today{background:var(--bl);color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px}
.mev{font-size:10px;border-radius:6px;padding:2px 6px;margin:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

/* TAREFAS KANBAN */
.tklayout{display:flex;flex:1;overflow:hidden}
.tkcol{flex:1;display:flex;flex-direction:column;border-right:1px solid var(--b1);overflow:hidden}
.tkcol:last-child{border-right:none}
.tkch{padding:14px 16px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg1)}
.tkct{font-size:13px;font-weight:600;color:var(--t1)}
.tkcn{font-size:11px;background:var(--bg2);border-radius:20px;padding:2px 10px;color:var(--t2);font-weight:500}
.tklist{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.tkcard{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:14px 16px;cursor:grab;user-select:none;transition:all .15s}
.tkcard:hover{border-color:var(--b2);box-shadow:0 3px 12px rgba(0,0,0,.07)}.tkcard.dr{opacity:.3;cursor:grabbing}
.tktitle{font-size:14px;font-weight:500;color:var(--t1);margin-bottom:8px;line-height:1.4}
.tkmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tktag{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.ta{background:var(--rbg);color:var(--rtx)}.tm{background:var(--abg);color:var(--atx)}.tb{background:var(--gbg);color:var(--gtx)}
.tk-dlg{background:var(--pubg);color:var(--putx);padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.tk-date{font-size:11px;color:var(--t2);background:var(--bg2);padding:3px 8px;border-radius:20px;font-weight:500}
.tkact{display:flex;gap:5px;flex-wrap:wrap}
.tkbtn{padding:5px 11px;border-radius:20px;border:1px solid var(--b1);background:var(--bg);color:var(--t2);cursor:pointer;font-size:11px;font-family:'Inter',sans-serif;font-weight:500;transition:all .1s;white-space:nowrap}
.tkbtn:hover{color:var(--t1);border-color:var(--b2)}
.tkbtn.del{color:var(--re)}.tkbtn.del:hover{background:var(--rbg);border-color:transparent}
.tkbtn.dlg{color:var(--pu)}.tkbtn.dlg:hover{background:var(--pubg);border-color:transparent}
.dzone{min-height:36px;border-radius:var(--r);border:2px dashed transparent;transition:all .15s}
.dzone.over{border-color:var(--bl);background:var(--bbg)}
.addtk{display:flex;align-items:center;gap:8px;padding:9px 14px;margin:4px 12px 12px;border-radius:var(--rl);border:1.5px dashed var(--b2);background:transparent;color:var(--t2);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif;font-weight:500;transition:all .15s}
.addtk:hover{border-color:var(--bl);color:var(--bl)}
.tk-panel{display:none;position:fixed;top:60px;right:0;bottom:0;width:290px;background:var(--bg1);border-left:1px solid var(--b1);padding:20px;z-index:50;overflow-y:auto;box-shadow:-6px 0 24px rgba(0,0,0,.08)}
.tk-panel.on{display:block}
.tp-lbl{font-size:11px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;margin-top:14px}
.tp-val{font-size:14px;color:var(--t1);line-height:1.5}

/* FINANCEIRO */
.ftable{width:100%;border-collapse:collapse}
.ftable th{font-size:11px;font-weight:600;color:var(--t2);text-align:left;padding:9px 18px;border-bottom:1px solid var(--b1);background:var(--bg);text-transform:uppercase;letter-spacing:.05em}
.ftable td{padding:11px 18px;font-size:14px;border-bottom:1px solid var(--b1);color:var(--t1)}
.ftable tr:last-child td{border-bottom:none}.ftable tr:hover td{background:var(--bg2)}

/* VENDAS */
.vwrap{flex:1;overflow-y:auto;padding:0}
.vnav{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--b1);background:var(--bg1);flex-shrink:0}
.vnav-lbl{font-size:16px;font-weight:600;color:var(--t1);flex:1;letter-spacing:-.2px}
.vtable-wrap{overflow-x:auto;padding:20px}
.vtable{width:100%;border-collapse:collapse;background:var(--bg1);border-radius:var(--rl);border:1px solid var(--b1);overflow:hidden}
.vtable th{font-size:12px;font-weight:600;color:var(--t2);padding:11px 14px;border-bottom:2px solid var(--b1);background:var(--bg2);text-align:center;white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.vtable th:first-child{text-align:left;width:80px}
.vtable td{padding:0;border-bottom:1px solid var(--b1);border-right:1px solid var(--b1);text-align:center}
.vtable td:first-child{padding:10px 14px;font-size:13px;font-weight:600;color:var(--t2);background:var(--bg2);border-right:2px solid var(--b1);text-align:left}
.vtable tr:last-child td{border-bottom:none}
.vcel{display:flex;align-items:center;justify-content:center;padding:0;height:46px}
.vinput{width:100%;height:46px;border:none;background:transparent;text-align:center;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;color:var(--t1);outline:none;cursor:pointer}
.vinput:focus{background:var(--bbg)}
.vinput::placeholder{color:var(--t3);font-weight:400}
.vtable tr:hover td:not(:first-child){background:rgba(37,99,235,.03)}
.vfoot td{background:var(--bg2)!important;font-weight:600!important;font-size:14px!important;color:var(--t1)!important;padding:11px 14px!important}
.vfoot td:first-child{font-size:12px!important;text-transform:uppercase;letter-spacing:.05em}
.vbadge{display:inline-flex;align-items:center;justify-content:center;min-width:40px;height:30px;border-radius:var(--r);font-size:13px;font-weight:600;padding:0 8px}
.vbadge.has{background:var(--gbg);color:var(--gtx)}.vbadge.zero{color:var(--t3)}
.vtabs{display:flex;gap:5px;padding:0 20px;border-bottom:1px solid var(--b1);background:var(--bg1);flex-shrink:0}
.vtab{padding:12px 16px;border:none;background:transparent;color:var(--t2);cursor:pointer;font-size:14px;font-family:'Inter',sans-serif;font-weight:500;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.vtab:hover{color:var(--t1)}
.vtab.on{color:var(--t1);border-bottom-color:var(--t1);font-weight:600}
.lojas-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;padding:20px}
.loja-card{background:var(--bg1);border:1px solid var(--b1);border-radius:var(--rl);padding:18px 20px;cursor:pointer;transition:all .15s}
.loja-card:hover{border-color:var(--b2);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.loja-card.on{border-color:var(--bl);background:var(--bbg)}
.loja-n{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:4px}
.loja-s{font-size:12px;color:var(--t2)}
</style>
</head>
<body>

<aside class="sidebar" id="sb">
  <div class="sb-top">
    <span class="sb-brand">Lucas OS</span>
    <button class="sb-tog" onclick="toggleSB()">&#9776;</button>
  </div>
  <nav class="sb-nav">
    <button class="sb-item on" onclick="sw('dash',this)"><span class="sb-icon">⊞</span><span class="sb-lbl">Dashboard</span></button>
    <button class="sb-item" onclick="sw('agenda',this)"><span class="sb-icon">◷</span><span class="sb-lbl">Agenda</span></button>
    <button class="sb-item" onclick="sw('tarefas',this)"><span class="sb-icon">✓</span><span class="sb-lbl">Tarefas</span></button>
    <button class="sb-item" onclick="sw('vendas',this)"><span class="sb-icon">↑</span><span class="sb-lbl">Vendas</span></button>

    </button>

</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-t" id="topbar-t">Dashboard</span>
    <div id="topbar-actions"></div>
  </div>

  <div class="view on" id="view-dash"><div class="feed" id="dash-body"></div></div>

    <div class="agh">

        <button class="btn" onclick="vNav(1)">&#8250;</button>

<!-- MODAIS -->
<div class="mo" id="mo-df" onclick="if(event.target===this)cmo('mo-df')"><div class="mbox">
  <h3 id="mo-df-t">Nova conta</h3>
  <div class="fl"><label>Descrição</label><input class="fi" id="df-desc"></div>
  <div class="frow"><div class="fl"><label>Valor R$</label><input type="number" class="fi" id="df-val" step="0.01"></div><div class="fl"><label>Vencimento</label><input type="date" class="fi" id="df-venc"></div></div>
  <div class="fl"><label>Status</label><select class="fi" id="df-st"><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="vencido">Vencido</option></select></div>
  <div class="ma"><button class="btn" onclick="cmo('mo-df')">Cancelar</button><button class="btn btnp" onclick="saveDashFin()">Salvar</button></div>
</div></div>
<div class="mo" id="mo-ev" onclick="if(event.target===this)cmo('mo-ev')"><div class="mbox">

  <div class="frow"><div class="fl"><label>Data</label><input type="date" class="fi" id="ev-d"></div><div class="fl"><label>Horário</label><input type="time" class="fi" id="ev-h" step="1800"></div></div>
  <div class="frow"><div class="fl"><label>Duração</label><select class="fi" id="ev-dur"><option value="0.5">30 min</option><option value="1" selected>1 hora</option><option value="1.5">1h30</option><option value="2">2 horas</option><option value="3">3 horas</option><option value="4">4 horas</option><option value="8">Dia todo</option></select></div><div class="fl"><label>Cor</label><select class="fi" id="ev-cor"><option value="bl">Azul</option><option value="gr">Verde</option><option value="am">Amarelo</option><option value="re">Vermelho</option><option value="pu">Roxo</option></select></div></div>
  <div class="fl"><label>Notas</label><input class="fi" id="ev-nota"></div>
  <div class="ma"><button class="btn btnd" id="ev-del-btn" style="margin-right:auto;display:none" onclick="delEvEdit()">Excluir</button><button class="btn" onclick="cmo('mo-ev')">Cancelar</button><button class="btn btnp" onclick="saveEv()">Salvar</button></div>
</div></div>
<div class="mo" id="mo-tk" onclick="if(event.target===this)cmo('mo-tk')"><div class="mbox">

  <div class="fl"><label>Descrição</label><textarea class="fi" id="tk-desc" rows="2"></textarea></div>
  <div class="frow"><div class="fl"><label>Prioridade</label><select class="fi" id="tk-prio"><option value="alta">Alta</option><option value="media" selected>Média</option><option value="baixa">Baixa</option></select></div><div class="fl"><label>Data</label><input type="date" class="fi" id="tk-data"></div></div>
  <div class="frow"><div class="fl"><label>Horário</label><input type="time" class="fi" id="tk-hora"></div><div class="fl"><label>Delegado para</label><input class="fi" id="tk-delegado"></div></div>
  <div class="ma"><button class="btn btnd" id="tk-del" style="margin-right:auto;display:none" onclick="delTask()">Excluir</button><button class="btn" onclick="cmo('mo-tk')">Cancelar</button><button class="btn btnp" onclick="saveTask()">Salvar</button></div>
</div></div>

  <h3 id="mo-fin-t">Nova conta</h3>
  <div class="fl"><label>Descrição</label><input class="fi" id="fin-desc"></div>
  <div class="frow"><div class="fl"><label>Valor R$</label><input type="number" class="fi" id="fin-val" step="0.01"></div><div class="fl"><label>Vencimento</label><input type="date" class="fi" id="fin-venc"></div></div>
  <div class="fl"><label>Status</label><select class="fi" id="fin-st"><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="vencido">Vencido</option></select></div>

</div></div>

  <h3>Nova loja</h3>

  <div class="ma"><button class="btn" onclick="cmo('mo-loja')">Cancelar</button><button class="btn btnp" onclick="saveLoja()">Adicionar</button></div>
</div></div>

<script>
let tasks=JSON.parse(localStorage.getItem('lo5_tasks')||'[]');
let events=JSON.parse(localStorage.getItem('lo5_events')||'[]');
let pags=JSON.parse(localStorage.getItem('lo5_pag')||'[]');
let recs=JSON.parse(localStorage.getItem('lo5_rec')||'[]');
let lojas=JSON.parse(localStorage.getItem('lo5_lojas')||JSON.stringify(['ML DL','ML MG','Shopee DL','Shopee MG','TikTok Shop']));
let vendas=JSON.parse(localStorage.getItem('lo5_vendas')||'{}');
let hideSaldo=localStorage.getItem('lo5_hs')==='1';
function save(){localStorage.setItem('lo5_tasks',JSON.stringify(tasks));localStorage.setItem('lo5_events',JSON.stringify(events));localStorage.setItem('lo5_pag',JSON.stringify(pags));localStorage.setItem('lo5_rec',JSON.stringify(recs));localStorage.setItem('lo5_lojas',JSON.stringify(lojas));localStorage.setItem('lo5_vendas',JSON.stringify(vendas))}
const MF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const DP=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const SLOT_H=40;
const COR={bl:{bg:'rgba(37,99,235,.1)',bd:'#2563eb',tx:'#185FA5'},gr:{bg:'rgba(26,158,98,.1)',bd:'#1a9e62',tx:'#0F6E56'},am:{bg:'rgba(184,115,0,.1)',bd:'#b87300',tx:'#854F0B'},re:{bg:'rgba(214,59,59,.1)',bd:'#d63b3b',tx:'#A32D2D'},pu:{bg:'rgba(109,79,194,.1)',bd:'#6d4fc2',tx:'#3C3489'}};
const TITLES={dash:'Dashboard',agenda:'Agenda',tarefas:'Tarefas',vendas:'Vendas',fin:'Financeiro'};
function R(v){if(hideSaldo)return'R$ ••••';return'R$\u00a0'+v.toFixed(2).replace('.',',')}
function fd(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}`}
function toDS(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
let sbOpen=true;
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('col',!sbOpen)}
function toggleSaldo(){hideSaldo=!hideSaldo;localStorage.setItem('lo5_hs',hideSaldo?'1':'0');document.getElementById('saldo-lbl').textContent=hideSaldo?'Mostrar saldo':'Ocultar saldo';document.getElementById('saldo-ic').textContent=hideSaldo?'🙈':'👁';const av=document.querySelector('.view.on')?.id?.replace('view-','');if(av==='dash')renderDash();if(av==='fin')renderFin()}
if(hideSaldo){document.getElementById('saldo-lbl').textContent='Mostrar saldo';document.getElementById('saldo-ic').textContent='🙈';}
function sw(v,btn){document.querySelectorAll('.view').forEach(e=>e.classList.remove('on'));document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('on'));document.getElementById('view-'+v).classList.add('on');btn.classList.add('on');document.getElementById('topbar-t').textContent=TITLES[v];if(v==='agenda')renderAg();if(v==='fin')renderFin();if(v==='tarefas')renderTasks();if(v==='dash')renderDash();if(v==='vendas')renderVendas()}
function cmo(id){document.getElementById(id).classList.remove('on')}
function omo(id){document.getElementById(id).classList.add('on')}

// DASHBOARD
let dM=new Date().getMonth(),dY=new Date().getFullYear(),dashFT='pag';
function renderDash(){
  const mk=`${dY}-${String(dM+1).padStart(2,'0')}`;
  const mp=pags.filter(e=>e.venc&&e.venc.startsWith(mk)),mr=recs.filter(e=>e.venc&&e.venc.startsWith(mk));
  const tR=mr.reduce((s,e)=>s+e.val,0),tP=mp.reduce((s,e)=>s+e.val,0),sl=tR-tP,mxB=Math.max(tR,tP,0.01);
  const pend=tasks.filter(t=>t.status==='pendente').length,and=tasks.filter(t=>t.status==='andamento').length;
  const conc=tasks.filter(t=>t.status==='concluido').length,canc=tasks.filter(t=>t.status==='cancelado').length;
  const tot=tasks.length,pct=tot>0?Math.round(conc/tot*100):0;
  const tod=toDS(new Date());
  const nev=events.filter(e=>e.data>=tod).sort((a,b)=>a.data.localeCompare(b.data)||a.hora.localeCompare(b.hora)).slice(0,4);
  const pp=mp.filter(e=>e.status!=='pago').slice(0,4);
  const abertas=tasks.filter(t=>t.status==='pendente'||t.status==='andamento');
  const fechadas=tasks.filter(t=>t.status==='concluido');
  document.getElementById('dash-body').innerHTML=`
    <div class="dnav">
      <button class="btn" onclick="dN(-1)">&#8249;</button>
      <span class="dlbl">${MF[dM]} ${dY}</span>
      <button class="btn" onclick="dN(1)">&#8250;</button>
      <button class="btn" onclick="dT()">Mês atual</button>
      <span style="flex:1"></span>
      <button class="btn" onclick="openDF('rec')">+ Recebimento</button>
      <button class="btn" onclick="openDF('pag')" style="margin-left:6px">+ Pagamento</button>
    </div>
    <div class="mcards">
      <div class="mc"><div class="mc-lbl">A receber</div><div class="mc-val g">${R(tR)}</div><div class="mc-sub">${mr.length} lançamentos</div></div>
      <div class="mc"><div class="mc-lbl">A pagar</div><div class="mc-val r">${R(tP)}</div><div class="mc-sub">${mp.length} lançamentos</div></div>
      <div class="mc"><div class="mc-lbl">Saldo do mês</div><div class="mc-val ${sl>=0?'g':'r'}">${R(sl)}</div></div>
      <div class="mc"><div class="mc-lbl">Próximos eventos</div><div class="mc-val b">${nev.length}</div><div class="mc-sub">agendados</div></div>
    </div>
    <div class="prog-card">
      <div class="prog-head"><span class="prog-title">Tarefas</span><span class="prog-pct">${pct}%</span></div>
      <div class="prog-bg"><div class="prog-bar" style="width:${pct}%"></div></div>
      <div class="prog-cols">
        <div class="pc"><div class="pc-n" style="color:var(--am)">${pend}</div><div class="pc-l">A fazer</div></div>
        <div class="pc"><div class="pc-n" style="color:var(--bl)">${and}</div><div class="pc-l">Andamento</div></div>
        <div class="pc"><div class="pc-n" style="color:var(--gr)">${conc}</div><div class="pc-l">Concluído</div></div>
        <div class="pc"><div class="pc-n" style="color:var(--t3)">${canc}</div><div class="pc-l">Cancelado</div></div>
      </div>
    </div>
    <div class="d2col">
      <div class="card">
        <div class="sh"><span class="st">Tarefas abertas — ${abertas.length}</span><button class="btn" style="font-size:12px" onclick="sw('tarefas',document.querySelectorAll('.sb-item')[2])">Kanban</button></div>
        ${abertas.length===0?'<div class="empty">Nada aberto 🎉</div>':abertas.slice(0,6).map(t=>{const tc={alta:'tag-a',media:'tag-m',baixa:'tag-b'}[t.prioridade]||'tag-m';const dlg=t.delegado?`<span class="tkc-dlg">→ ${t.delegado}</span>`:'';return`<div class="tkc-row"><div class="tkc-left"><div class="tkc-title">${t.titulo}</div><div class="tkc-meta"><span class="tkc-tag ${tc}">${t.prioridade}</span>${dlg}</div></div><div class="tkc-btns"><button class="tkc-btn${t.status==='andamento'?' active':''}" onclick="setTS('${t.id}','andamento')">${t.status==='andamento'?'Em andamento':'Iniciar'}</button><button class="tkc-btn done" onclick="setTS('${t.id}','concluido')">✓</button></div></div>`;}).join('')}
      </div>
      <div class="card">
        <div class="sh"><span class="st">Concluídas — ${fechadas.length}</span></div>
        ${fechadas.length===0?'<div class="empty">Nenhuma ainda</div>':fechadas.slice(-5).reverse().map(t=>`<div class="tkc-row"><div class="tkc-left"><div class="tkc-title" style="text-decoration:line-through;color:var(--t2)">${t.titulo}</div>${t.delegado?`<div class="tkc-meta"><span class="tkc-dlg">→ ${t.delegado}</span></div>`:''}</div><button class="tkc-btn" onclick="setTS('${t.id}','pendente')">Reabrir</button></div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="sh"><span class="st">Fluxo ${MS[dM]} ${dY}</span></div>
      <div class="fw">
        <div class="frow2"><span class="flbl2">Recebimentos</span><div class="fbg"><div class="fbar fbg2" style="width:${Math.round(tR/mxB*100)}%"></div></div><span class="fv" style="color:var(--gr)">${R(tR)}</span></div>
        <div class="frow2"><span class="flbl2">Pagamentos</span><div class="fbg"><div class="fbar fbr2" style="width:${Math.round(tP/mxB*100)}%"></div></div><span class="fv" style="color:var(--re)">${R(tP)}</span></div>
        <div class="frow2"><span class="flbl2">Saldo</span><div class="fbg"><div class="fbar fbb2" style="width:${Math.round(Math.abs(sl)/mxB*100)}%"></div></div><span class="fv" style="color:var(--${sl>=0?'gr':'re'})">${R(sl)}</span></div>
      </div>
    </div>
    <div class="d2col">
      <div class="card">
        <div class="sh"><span class="st">Próximos eventos</span></div>
        ${nev.length===0?'<div class="empty">Sem eventos</div>':nev.map(e=>{const c=COR[e.cor||'bl'];return`<div class="ditem"><div class="ddot" style="background:${c.bd}"></div><div style="flex:1"><div style="font-weight:500">${e.titulo}</div><div style="font-size:12px;color:var(--t2)">${fd(e.data)} ${e.hora} · ${e.dur}h</div></div></div>`}).join('')}
      </div>
      <div class="card">
        <div class="sh"><span class="st">Contas pendentes</span></div>
        ${pp.length===0?'<div class="empty">Tudo em dia ✓</div>':pp.map(e=>`<div class="ditem"><div class="ddot" style="background:var(--${e.status==='vencido'?'re':'am'})"></div><div style="flex:1"><div style="font-weight:500">${e.desc}</div><div style="font-size:12px;color:var(--t2)">venc. ${fd(e.venc)}</div></div><span style="font-size:13px;font-weight:600;color:var(--re)">${R(e.val)}</span></div>`).join('')}
      </div>
    </div>`;
}
function dN(d){dM+=d;if(dM>11){dM=0;dY++}if(dM<0){dM=11;dY--}renderDash()}
function dT(){dM=new Date().getMonth();dY=new Date().getFullYear();renderDash()}
function openDF(t){dashFT=t;document.getElementById('mo-df-t').textContent=t==='pag'?'Nova conta a pagar':'Novo recebimento';['df-desc','df-val','df-venc'].forEach(id=>document.getElementById(id).value='');document.getElementById('df-st').value='pendente';omo('mo-df')}
function saveDashFin(){const d=document.getElementById('df-desc').value.trim();const v=parseFloat(document.getElementById('df-val').value);if(!d||!v)return;const e={id:Date.now().toString(),desc:d,val:v,venc:document.getElementById('df-venc').value,status:document.getElementById('df-st').value};if(dashFT==='pag')pags.push(e);else recs.push(e);save();cmo('mo-df');renderDash()}
function setTS(id,s){const t=tasks.find(x=>x.id===id);if(t){t.status=s;save();renderDash()}}

// AGENDA
let agV='s',agS=new Date(),agMon=new Date(),editEvId=null;
agS.setDate(agS.getDate()-((agS.getDay()+6)%7));
const HOURS=[];for(let h=7;h<=22;h++){HOURS.push({lb:`${String(h).padStart(2,'0')}:00`,t:`${String(h).padStart(2,'0')}:00`,half:false});if(h<22)HOURS.push({lb:'',t:`${String(h).padStart(2,'0')}:30`,half:true})}
const TS=HOURS.length;
function setAV(v){agV=v;document.getElementById('vts').classList.toggle('on',v==='s');document.getElementById('vtm').classList.toggle('on',v==='m');renderAg()}
function agNav(d){if(agV==='s')agS.setDate(agS.getDate()+d*7);else agMon.setMonth(agMon.getMonth()+d);renderAg()}
function agToday(){agS=new Date();agS.setDate(agS.getDate()-((agS.getDay()+6)%7));agMon=new Date();renderAg()}
function renderAg(){
  const body=document.getElementById('agbody'),lbl=document.getElementById('aglbl');body.innerHTML='';
  if(agV==='s'){
    const days=[];for(let i=0;i<7;i++){const d=new Date(agS);d.setDate(d.getDate()+i);days.push(d)}
    lbl.textContent=`${days[0].getDate()} ${MS[days[0].getMonth()]} — ${days[6].getDate()} ${MS[days[6].getMonth()]} ${days[6].getFullYear()}`;
    const wrap=document.createElement('div');wrap.className='ag-week';
    const tc=document.createElement('div');tc.className='ag-tc';
    const th=document.createElement('div');th.style.cssText='height:42px;border-bottom:1px solid var(--b1);flex-shrink:0';tc.appendChild(th);
    HOURS.forEach(s=>{const r=document.createElement('div');r.className=`tslot${s.half?' half':''}`;r.innerHTML=`<span class="tlbl">${s.lb}</span>`;tc.appendChild(r)});
    wrap.appendChild(tc);
    const dw=document.createElement('div');dw.className='ag-days';
    const ts=new Date().toDateString();
    days.forEach(day=>{
      const ds=toDS(day),isT=day.toDateString()===ts;
      const col=document.createElement('div');col.className='agcol';
      const ch=document.createElement('div');ch.className=`agch${isT?' td':''}`;
      ch.innerHTML=`${DP[day.getDay()]}<small>${isT?`<span style="background:var(--bl);color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:10px">${day.getDate()}</span>`:day.getDate()}/${day.getMonth()+1}</small>`;
      col.appendChild(ch);
      const cb=document.createElement('div');cb.className='agcb';cb.style.cssText=`height:${TS*SLOT_H}px;position:relative`;
      HOURS.forEach((s,idx)=>{const sa=document.createElement('div');sa.className='sarea';sa.style.cssText=`top:${idx*SLOT_H}px;height:${SLOT_H}px`;sa.onclick=()=>openEvMo(ds,s.t);cb.appendChild(sa)});
      events.filter(e=>e.data===ds).forEach(ev=>{
        const h=parseInt(ev.hora.split(':')[0]),m=parseInt(ev.hora.split(':')[1]);
        const si=(h-7)*2+(m>=30?1:0);const ds2=parseFloat(ev.dur||1)*2;const c=COR[ev.cor||'bl'];
        const el=document.createElement('div');el.className='sev';
        el.style.cssText=`top:${si*SLOT_H+2}px;height:${Math.max(ds2*SLOT_H-4,SLOT_H-4)}px;background:${c.bg};border-left-color:${c.bd};color:${c.tx}`;
        el.innerHTML=`<div class="sev-t">${ev.titulo}</div><div class="sev-s">${ev.hora} · ${ev.dur}h</div><span class="dx" onclick="clickDelEv('${ev.id}',event)">✕</span>`;
        el.onclick=(e)=>{if(!e.target.classList.contains('dx'))openEvEdit(ev.id)};
        el.draggable=true;el.ondragstart=(e)=>{e.dataTransfer.setData('evId',ev.id);e.stopPropagation()};
        cb.appendChild(el);
      });
      cb.ondragover=e=>e.preventDefault();
      cb.ondrop=e=>{e.preventDefault();const evId=e.dataTransfer.getData('evId');if(!evId)return;const rect=cb.getBoundingClientRect();const ry=e.clientY-rect.top;const idx=Math.max(0,Math.floor(ry/SLOT_H));const hh=7+Math.floor(idx/2);const mm=idx%2===0?'00':'30';const ev=events.find(x=>x.id===evId);if(ev){ev.data=ds;ev.hora=`${String(hh).padStart(2,'0')}:${mm}`;save();renderAg()}};
      col.appendChild(cb);dw.appendChild(col);
    });
    let sy=false;const cols=Array.from(dw.querySelectorAll('.agcol'));
    cols.forEach(c=>c.addEventListener('scroll',()=>{if(sy)return;sy=true;cols.forEach(x=>{if(x!==c)x.scrollTop=c.scrollTop});tc.scrollTop=c.scrollTop;sy=false}));
    wrap.appendChild(dw);body.appendChild(wrap);
    setTimeout(()=>{const fc=dw.querySelector('.agcol');if(fc)fc.scrollTop=2*SLOT_H},60);
  } else {
    const yr=agMon.getFullYear(),mn=agMon.getMonth();lbl.textContent=`${MF[mn]} ${yr}`;
    const wrap=document.createElement('div');wrap.className='ag-month';
    wrap.innerHTML=`<div class="mgh-r">${DP.map(d=>`<div class="mgh">${d}</div>`).join('')}</div>`;
    const grid=document.createElement('div');grid.className='mgrid';
    const first=new Date(yr,mn,1),sd=(first.getDay()+6)%7,dim=new Date(yr,mn+1,0).getDate(),ts2=toDS(new Date());
    for(let i=0;i<sd;i++){const pd=new Date(yr,mn,1-sd+i);const c=document.createElement('div');c.className='mday om';c.innerHTML=`<div class="dnum">${pd.getDate()}</div>`;grid.appendChild(c)}
    for(let d=1;d<=dim;d++){
      const ds=toDS(new Date(yr,mn,d)),devs=events.filter(e=>e.data===ds);
      const c=document.createElement('div');c.className='mday';c.onclick=()=>openEvMo(ds,'09:00');
      c.innerHTML=`<div class="dnum">${ds===ts2?`<span class="today">${d}</span>`:d}</div>${devs.slice(0,3).map(e=>{const cor=COR[e.cor||'bl'];return`<div class="mev" style="color:${cor.tx};background:${cor.bg}">${e.hora} ${e.titulo}</div>`}).join('')}${devs.length>3?`<div style="font-size:10px;color:var(--t3)">+${devs.length-3}</div>`:''}`;
      grid.appendChild(c);
    }
    wrap.appendChild(grid);body.appendChild(wrap);
  }
}
function openEvMo(d,h){editEvId=null;document.getElementById('mo-ev-t').textContent='Novo evento';document.getElementById('ev-d').value=d;document.getElementById('ev-h').value=h;document.getElementById('ev-t').value='';document.getElementById('ev-dur').value='1';document.getElementById('ev-cor').value='bl';document.getElementById('ev-nota').value='';document.getElementById('ev-del-btn').style.display='none';omo('mo-ev');setTimeout(()=>document.getElementById('ev-t').focus(),50)}
function openEvEdit(id){const ev=events.find(x=>x.id===id);if(!ev)return;editEvId=id;document.getElementById('mo-ev-t').textContent='Editar evento';document.getElementById('ev-d').value=ev.data;document.getElementById('ev-h').value=ev.hora;document.getElementById('ev-t').value=ev.titulo;document.getElementById('ev-dur').value=String(ev.dur||1);document.getElementById('ev-cor').value=ev.cor||'bl';document.getElementById('ev-nota').value=ev.nota||'';document.getElementById('ev-del-btn').style.display='block';omo('mo-ev')}
function saveEv(){const t=document.getElementById('ev-t').value.trim();if(!t)return;if(editEvId){const ev=events.find(x=>x.id===editEvId);ev.titulo=t;ev.data=document.getElementById('ev-d').value;ev.hora=document.getElementById('ev-h').value;ev.dur=parseFloat(document.getElementById('ev-dur').value);ev.cor=document.getElementById('ev-cor').value;ev.nota=document.getElementById('ev-nota').value}else{events.push({id:Date.now().toString(),titulo:t,data:document.getElementById('ev-d').value,hora:document.getElementById('ev-h').value,dur:parseFloat(document.getElementById('ev-dur').value),cor:document.getElementById('ev-cor').value,nota:document.getElementById('ev-nota').value})}save();cmo('mo-ev');renderAg()}
function clickDelEv(id,e){e.stopPropagation();events=events.filter(x=>x.id!==id);save();renderAg()}
function delEvEdit(){events=events.filter(x=>x.id!==editEvId);save();cmo('mo-ev');renderAg()}

// TAREFAS
const COLS=[{id:'pendente',lbl:'A fazer'},{id:'andamento',lbl:'Em andamento'},{id:'concluido',lbl:'Concluído'},{id:'cancelado',lbl:'Cancelado'}];
let eTkId=null,dragId=null;
function renderTasks(){
  const layout=document.getElementById('tklayout');layout.innerHTML='';
  COLS.forEach(col=>{
    const ct=tasks.filter(t=>t.status===col.id);
    const div=document.createElement('div');div.className='tkcol';
    const head=document.createElement('div');head.className='tkch';head.innerHTML=`<span class="tkct">${col.lbl}</span><span class="tkcn">${ct.length}</span>`;div.appendChild(head);
    const list=document.createElement('div');list.className='tklist';list.id='col-'+col.id;
    list.ondragover=e=>{e.preventDefault();list.querySelector('.dzone')?.classList.add('over')};
    list.ondragleave=()=>list.querySelector('.dzone')?.classList.remove('over');
    list.ondrop=e=>{e.preventDefault();if(!dragId)return;const t=tasks.find(x=>x.id===dragId);if(t)t.status=col.id;save();renderTasks()};
    ct.forEach(t=>{
      const card=document.createElement('div');card.className='tkcard';card.draggable=true;
      const tc={alta:'ta',media:'tm',baixa:'tb'}[t.prioridade]||'tm';
      const dt=t.data?`<span class="tk-date">${fd(t.data)}${t.hora?' '+t.hora:''}</span>`:'';
      const dlg=t.delegado?`<span class="tk-dlg">→ ${t.delegado}</span>`:'';
      card.innerHTML=`<div class="tktitle">${t.titulo}</div><div class="tkmeta"><span class="tktag ${tc}">${t.prioridade}</span>${dt}${dlg}</div><div class="tkact"><button class="tkbtn" onclick="verTask('${t.id}',event)">Ver</button><button class="tkbtn dlg" onclick="delegarTask('${t.id}',event)">Delegar</button><button class="tkbtn" onclick="editTask('${t.id}',event)">Editar</button><button class="tkbtn del" onclick="delTaskD('${t.id}',event)">✕</button></div>`;
      card.ondragstart=e=>{dragId=t.id;setTimeout(()=>card.classList.add('dr'),0)};
      card.ondragend=()=>{card.classList.remove('dr');document.querySelectorAll('.dzone').forEach(el=>el.classList.remove('over'))};
      list.appendChild(card);
    });
    const dz=document.createElement('div');dz.className='dzone';list.appendChild(dz);
    div.appendChild(list);
    const ab=document.createElement('button');ab.className='addtk';ab.textContent='+ Adicionar';ab.onclick=()=>newTask(col.id);
    div.appendChild(ab);layout.appendChild(div);
  });
}
function verTask(id,e){
  e.stopPropagation();const t=tasks.find(x=>x.id===id);if(!t)return;
  const panel=document.getElementById('tk-panel');
  const tc={alta:'var(--re)',media:'var(--am)',baixa:'var(--gr)'}[t.prioridade];
  panel.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid var(--b1);margin-bottom:4px"><span style="font-size:15px;font-weight:600">Detalhe</span><button class="btn" onclick="document.getElementById('tk-panel').classList.remove('on')" style="padding:3px 10px;font-size:12px">✕</button></div>
    <div class="tp-lbl">Título</div><div class="tp-val">${t.titulo}</div>
    ${t.descricao?`<div class="tp-lbl">Descrição</div><div class="tp-val" style="color:var(--t2)">${t.descricao}</div>`:''}
    <div class="tp-lbl">Prioridade</div><div class="tp-val" style="color:${tc};font-weight:600">${t.prioridade}</div>
    <div class="tp-lbl">Status</div><div class="tp-val">${t.status}</div>
    ${t.data?`<div class="tp-lbl">Data</div><div class="tp-val">${fd(t.data)}${t.hora?' às '+t.hora:''}</div>`:''}
    ${t.delegado?`<div class="tp-lbl">Delegado para</div><div class="tp-val" style="color:var(--pu);font-weight:600">${t.delegado}</div>`:''}
    <div style="display:flex;gap:8px;margin-top:18px"><button class="btn" style="color:var(--pu);flex:1" onclick="delegarTask('${t.id}',event)">Delegar</button><button class="btn btnp" style="flex:1" onclick="editTask('${t.id}',event)">Editar</button></div>`;
  panel.classList.add('on');
}
function delegarTask(id,e){e.stopPropagation();const t=tasks.find(x=>x.id===id);if(!t)return;const n=prompt('Delegar para quem?',t.delegado||'');if(n===null)return;t.delegado=n.trim();save();renderTasks()}
function newTask(col){eTkId=null;document.getElementById('mo-tk-t').textContent='Nova tarefa';['tk-titulo','tk-desc','tk-data','tk-hora','tk-delegado'].forEach(id=>document.getElementById(id).value='');document.getElementById('tk-prio').value='media';document.getElementById('tk-del').style.display='none';document.getElementById('tk-del').dataset.col=col;omo('mo-tk');setTimeout(()=>document.getElementById('tk-titulo').focus(),50)}
function editTask(id,e){if(e)e.stopPropagation();eTkId=id;const t=tasks.find(x=>x.id===id);document.getElementById('mo-tk-t').textContent='Editar tarefa';document.getElementById('tk-titulo').value=t.titulo;document.getElementById('tk-desc').value=t.descricao||'';document.getElementById('tk-prio').value=t.prioridade;document.getElementById('tk-data').value=t.data||'';document.getElementById('tk-hora').value=t.hora||'';document.getElementById('tk-delegado').value=t.delegado||'';document.getElementById('tk-del').style.display='block';document.getElementById('tk-panel').classList.remove('on');omo('mo-tk');setTimeout(()=>document.getElementById('tk-titulo').focus(),50)}
function saveTask(){const t=document.getElementById('tk-titulo').value.trim();if(!t)return;const db=document.getElementById('tk-del');if(eTkId){const tk=tasks.find(x=>x.id===eTkId);tk.titulo=t;tk.descricao=document.getElementById('tk-desc').value;tk.prioridade=document.getElementById('tk-prio').value;tk.data=document.getElementById('tk-data').value;tk.hora=document.getElementById('tk-hora').value;tk.delegado=document.getElementById('tk-delegado').value}else{tasks.push({id:Date.now().toString(),titulo:t,descricao:document.getElementById('tk-desc').value,prioridade:document.getElementById('tk-prio').value,data:document.getElementById('tk-data').value,hora:document.getElementById('tk-hora').value,delegado:document.getElementById('tk-delegado').value,status:db.dataset.col||'pendente'})}save();cmo('mo-tk');renderTasks()}
function delTask(){tasks=tasks.filter(t=>t.id!==eTkId);save();cmo('mo-tk');renderTasks()}
function delTaskD(id,e){e.stopPropagation();tasks=tasks.filter(t=>t.id!==id);save();renderTasks()}

// VENDAS
let vM=new Date().getMonth(),vY=new Date().getFullYear(),vLoja=lojas[0]||'';
function vKey(loja,data){return`${loja}||${data}`}
function getVenda(loja,data){return vendas[vKey(loja,data)]||''}
function setVenda(loja,data,v){vendas[vKey(loja,data)]=v;save()}
function vNav(d){vM+=d;if(vM>11){vM=0;vY++}if(vM<0){vM=11;vY--}renderVendas()}
function vToday(){vM=new Date().getMonth();vY=new Date().getFullYear();renderVendas()}
function openLojaModal(){document.getElementById('loja-nome').value='';omo('mo-loja');setTimeout(()=>document.getElementById('loja-nome').focus(),50)}
function saveLoja(){const n=document.getElementById('loja-nome').value.trim();if(!n)return;if(!lojas.includes(n)){lojas.push(n);if(!vLoja)vLoja=n;save()}cmo('mo-loja');renderVendas()}
function renderVendas(){
  document.getElementById('vmes-lbl').textContent=`${MF[vM]} ${vY}`;
  const tabs=document.getElementById('vtabs');tabs.innerHTML='';
  lojas.forEach(l=>{
    const btn=document.createElement('button');btn.className=`vtab${l===vLoja?' on':''}`;btn.textContent=l;
    btn.onclick=()=>{vLoja=l;renderVendas()};tabs.appendChild(btn);
  });
  if(lojas.length===0){document.getElementById('vendas-body').innerHTML='<div style="padding:40px;text-align:center;color:var(--t3);font-size:15px">Adicione uma loja para começar</div>';return}
  if(!vLoja||!lojas.includes(vLoja))vLoja=lojas[0];
  const dim=new Date(vY,vM+1,0).getDate();
  let total=0;
  const dias=[];for(let d=1;d<=dim;d++){
    const ds=toDS(new Date(vY,vM,d));
    const v=getVenda(vLoja,ds);dias.push({d,ds,v:v?parseInt(v)||0:null});
    total+=(v?parseInt(v)||0:0);
  }
  const body=document.getElementById('vendas-body');
  body.innerHTML=`<div class="vtable-wrap">
    <table class="vtable">
      <thead><tr><th>Dia</th><th>${vLoja}</th></tr></thead>
      <tbody>
        ${dias.map(({d,ds,v})=>`<tr>
          <td>${String(d).padStart(2,'0')}/${String(vM+1).padStart(2,'0')}</td>
          <td><div class="vcel"><input class="vinput" type="number" min="0" placeholder="—" value="${v!==null&&v>0?v:''}" onchange="setVenda('${vLoja}','${ds}',this.value);renderVendasTotal()" oninput="setVenda('${vLoja}','${ds}',this.value)"></div></td>
        </tr>`).join('')}
        <tr class="vfoot"><td>Total</td><td id="vtotal" style="text-align:center;font-size:16px;color:var(--gr)">${total}</td></tr>
      </tbody>
    </table>
  </div>`;
}
function renderVendasTotal(){
  const dim=new Date(vY,vM+1,0).getDate();let t=0;
  for(let d=1;d<=dim;d++){const ds=toDS(new Date(vY,vM,d));const v=getVenda(vLoja,ds);t+=v?parseInt(v)||0:0}
  const el=document.getElementById('vtotal');if(el)el.textContent=t;
}

// FINANCEIRO
let fM=new Date().getMonth(),fY=new Date().getFullYear(),finT='pag';
function renderFin(){
  const mk=`${fY}-${String(fM+1).padStart(2,'0')}`;
  const ap=pags.filter(e=>!e.venc||e.venc.startsWith(mk)),ar=recs.filter(e=>!e.venc||e.venc.startsWith(mk));
  const tR=ar.reduce((s,e)=>s+e.val,0),tP=ap.reduce((s,e)=>s+e.val,0),sl=tR-tP,mxB=Math.max(tR,tP,0.01);
  document.getElementById('finwrap').innerHTML=`
    <div class="dnav"><button class="btn" onclick="fN(-1)">&#8249;</button><span class="dlbl">${MF[fM]} ${fY}</span><button class="btn" onclick="fN(1)">&#8250;</button><button class="btn" onclick="fT()">Mês atual</button></div>
    <div class="mcards">
      <div class="mc"><div class="mc-lbl">A receber</div><div class="mc-val g">${R(tR)}</div></div>
      <div class="mc"><div class="mc-lbl">A pagar</div><div class="mc-val r">${R(tP)}</div></div>
      <div class="mc"><div class="mc-lbl">Saldo</div><div class="mc-val ${sl>=0?'g':'r'}">${R(sl)}</div></div>
    </div>
    <div class="card"><div class="sh"><span class="st">Fluxo ${MS[fM]} ${fY}</span></div><div class="fw"><div class="frow2"><span class="flbl2">Recebimentos</span><div class="fbg"><div class="fbar fbg2" style="width:${Math.round(tR/mxB*100)}%"></div></div><span class="fv" style="color:var(--gr)">${R(tR)}</span></div><div class="frow2"><span class="flbl2">Pagamentos</span><div class="fbg"><div class="fbar fbr2" style="width:${Math.round(tP/mxB*100)}%"></div></div><span class="fv" style="color:var(--re)">${R(tP)}</span></div><div class="frow2"><span class="flbl2">Saldo</span><div class="fbg"><div class="fbar fbb2" style="width:${Math.round(Math.abs(sl)/mxB*100)}%"></div></div><span class="fv" style="color:var(--${sl>=0?'gr':'re'})">${R(sl)}</span></div></div></div>
    <div class="card"><div class="sh"><span class="st">Contas a receber</span><button class="btn" onclick="oFinMo('rec')">+ Adicionar</button></div>${ar.length===0?'<div class="empty">Nenhum lançamento</div>':`<table class="ftable"><thead><tr><th>Descrição</th><th>Valor</th><th>Venc.</th><th>Status</th><th></th></tr></thead><tbody>${ar.map(e=>`<tr><td style="font-weight:500">${e.desc}</td><td style="color:var(--gr);font-weight:600">${R(e.val)}</td><td style="color:var(--t2)">${fd(e.venc)}</td><td><span class="pill p-${e.status}" onclick="tgSt('rec','${e.id}')">${e.status}</span></td><td><button class="btn btnd" style="padding:3px 10px;font-size:12px" onclick="dFin('rec','${e.id}')">✕</button></td></tr>`).join('')}</tbody></table>`}</div>
    <div class="card"><div class="sh"><span class="st">Contas a pagar</span><button class="btn" onclick="oFinMo('pag')">+ Adicionar</button></div>${ap.length===0?'<div class="empty">Nenhum lançamento</div>':`<table class="ftable"><thead><tr><th>Descrição</th><th>Valor</th><th>Venc.</th><th>Status</th><th></th></tr></thead><tbody>${ap.map(e=>`<tr><td style="font-weight:500">${e.desc}</td><td style="color:var(--re);font-weight:600">${R(e.val)}</td><td style="color:var(--t2)">${fd(e.venc)}</td><td><span class="pill p-${e.status}" onclick="tgSt('pag','${e.id}')">${e.status}</span></td><td><button class="btn btnd" style="padding:3px 10px;font-size:12px" onclick="dFin('pag','${e.id}')">✕</button></td></tr>`).join('')}</tbody></table>`}</div>`;
}
function fN(d){fM+=d;if(fM>11){fM=0;fY++}if(fM<0){fM=11;fY--}renderFin()}
function fT(){fM=new Date().getMonth();fY=new Date().getFullYear();renderFin()}
function oFinMo(t){finT=t;document.getElementById('mo-fin-t').textContent=t==='pag'?'Nova conta a pagar':'Novo recebimento';['fin-desc','fin-val','fin-venc'].forEach(id=>document.getElementById(id).value='');document.getElementById('fin-st').value='pendente';omo('mo-fin')}
function saveFinEntry(){const d=document.getElementById('fin-desc').value.trim();const v=parseFloat(document.getElementById('fin-val').value);if(!d||!v)return;const e={id:Date.now().toString(),desc:d,val:v,venc:document.getElementById('fin-venc').value,status:document.getElementById('fin-st').value};if(finT==='pag')pags.push(e);else recs.push(e);save();cmo('mo-fin');renderFin()}
function tgSt(t,id){const arr=t==='pag'?pags:recs;const e=arr.find(x=>x.id===id);if(!e)return;const c={pendente:'pago',pago:'vencido',vencido:'pendente'};e.status=c[e.status]||'pendente';save();renderFin()}
function dFin(t,id){if(t==='pag')pags=pags.filter(x=>x.id!==id);else recs=recs.filter(x=>x.id!==id);save();renderFin()}

renderDash();
</script>
</body>
