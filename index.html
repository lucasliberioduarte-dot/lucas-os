<script>
window.sw = function (tela, botao) {
  console.log("trocando para:", tela);

  // remove ativo dos botões
  document.querySelectorAll('.sbi').forEach(b => b.classList.remove('on'));
  if (botao) botao.classList.add('on');

  // esconde todas as views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('on'));

  // mostra a view correta
  const view = document.getElementById('view-' + tela);
  if (view) {
    view.classList.add('on');
  } else {
    console.log("view não encontrada:", tela);
  }

  // atualiza título
  const titulo = {
    dash: "Dashboard",
    agenda: "Agenda",
    tarefas: "Tarefas",
    fin: "Financeiro"
  };

  const top = document.getElementById("topbar-t");
  if (top && titulo[tela]) {
    top.innerText = titulo[tela];
  }
};
</script>
<script>
window.toggleSaldo = function () {
  const btn = document.getElementById("saldo-btn");
  const ic = document.getElementById("saldo-ic");
  const lb = document.getElementById("saldo-lb");

  const oculto = btn.classList.toggle("oculto");

  // troca ícone e texto
  if (oculto) {
    ic.innerText = "🙈";
    lb.innerText = "Mostrar saldo";

    // esconde valores (classe que você usa no financeiro)
    document.querySelectorAll(".mc-val").forEach(el => {
      el.setAttribute("data-original", el.innerText);
      el.innerText = "R$ •••••";
    });

  } else {
    ic.innerText = "👁";
    lb.innerText = "Ocultar saldo";

    // volta valores
    document.querySelectorAll(".mc-val").forEach(el => {
      if (el.getAttribute("data-original")) {
        el.innerText = el.getAttribute("data-original");
      }
    });
  }
};
</script>
